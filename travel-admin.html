<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1208;--parchment:#faf6ef;--warm:#c8873a;--muted:#8a7560;--card:#fff9f2;--border:#e8dfd0;--green:#2d6b5e;--red:#c0392b}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink)}
.layout{display:flex;height:100vh;flex-direction:column}
header{padding:0.6rem 1.2rem;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:0.8rem;flex-shrink:0}
header h1{font-family:'Playfair Display',serif;font-size:1.1rem}
header h1 span{color:var(--warm);font-style:italic}
header p{font-size:0.72rem;color:var(--muted)}
.body{display:flex;flex:1;overflow:hidden}
#map{flex:1;height:100%;min-width:0}

/* ── Sidebar ── */
.sidebar{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.stabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:0.5rem 0.3rem;font-size:0.74rem;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:color 0.15s}
.stab.on{color:var(--warm);border-bottom-color:var(--warm);font-weight:500}
.panel{display:none;padding:1rem;flex:1;overflow-y:auto;flex-direction:column}
.panel.on{display:flex}

/* ── Place search ── */
.search-wrap{position:relative;margin-bottom:0.8rem}
.search-wrap input{width:100%;padding:0.45rem 2rem 0.45rem 0.7rem;border:1px solid var(--border);border-radius:4px;background:var(--parchment);font-family:'DM Sans',sans-serif;font-size:0.83rem;color:var(--ink);outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--warm)}
.search-icon{position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.78rem;pointer-events:none}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:0 0 4px 4px;z-index:9999;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(26,18,8,0.1)}
.sugg-item{padding:0.45rem 0.7rem;font-size:0.79rem;cursor:pointer;border-bottom:1px solid var(--border);line-height:1.3}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover{background:var(--parchment)}
.sugg-item strong{display:block;color:var(--ink)}
.sugg-item span{color:var(--muted);font-size:0.7rem}

/* ── Form ── */
.field{margin-bottom:0.7rem}
label{display:block;font-size:0.67rem;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:0.25rem}
input[type=text],input[type=number],textarea,select{width:100%;padding:0.42rem 0.65rem;border:1px solid var(--border);border-radius:4px;background:var(--parchment);font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--ink);outline:none;transition:border-color 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--warm)}
textarea{resize:vertical;min-height:48px}
.coord-row{display:flex;gap:0.4rem}
.coord-row input{flex:1}
.hint{font-size:0.71rem;color:var(--muted);margin-bottom:0.7rem;padding:0.4rem 0.6rem;background:var(--parchment);border-radius:3px;border:1px solid var(--border);line-height:1.4}
.flag-preview{display:none;align-items:center;gap:0.5rem;padding:0.35rem 0.6rem;background:var(--parchment);border:1px solid var(--border);border-radius:3px;margin-bottom:0.7rem;font-size:0.8rem;color:var(--muted)}
.flag-preview.on{display:flex}
.btn{background:var(--warm);color:#fff;border:none;padding:0.45rem 1rem;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;transition:opacity 0.2s;width:100%}
.btn:hover{opacity:0.85}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn.green{background:var(--green)}
.form-msg{padding:0.4rem 0.65rem;border-radius:4px;font-size:0.76rem;margin-top:0.5rem;display:none}
.form-msg.ok{background:#ddf0ec;color:var(--green);display:block}
.form-msg.err{background:#fde8e8;color:var(--red);display:block}

/* ── Pin list ── */
.list-search{width:100%;padding:0.38rem 0.65rem;border:1px solid var(--border);border-radius:4px;background:var(--parchment);font-family:'DM Sans',sans-serif;font-size:0.79rem;color:var(--ink);outline:none;margin-bottom:0.6rem;flex-shrink:0}
.list-search:focus{border-color:var(--warm)}
.pin-list{display:flex;flex-direction:column;gap:0;flex:1;overflow-y:auto}
.pin-group{margin-bottom:0.5rem}
.pin-group-header{font-size:0.67rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);padding:0.4rem 0 0.2rem;border-bottom:1px solid var(--border);margin-bottom:0.2rem;display:flex;align-items:center;gap:0.35rem}
.pin-count{font-weight:300;color:var(--border)}
.pin-item{display:flex;align-items:center;gap:0.4rem;padding:0.32rem 0.4rem;border-radius:3px;cursor:pointer;transition:background 0.1s}
.pin-item:hover{background:var(--parchment)}
.pin-cat-icon{font-size:12px;flex-shrink:0;width:16px;text-align:center}
.pin-info{flex:1;min-width:0}
.pin-name{font-size:0.79rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.pin-actions{display:flex;gap:0.1rem;flex-shrink:0;opacity:0;transition:opacity 0.15s}
.pin-item:hover .pin-actions{opacity:1}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.78rem;padding:0.1rem 0.2rem;border-radius:2px;line-height:1}
.icon-btn:hover{color:var(--ink)}
.icon-btn.del:hover{color:var(--red)}

/* ── Import ── */
.upload-area{border:2px dashed var(--border);border-radius:4px;padding:1.1rem;text-align:center;cursor:pointer;color:var(--muted);font-size:0.79rem;transition:border-color 0.2s;margin-bottom:0.6rem}
.upload-area:hover{border-color:var(--warm)}
.import-log{max-height:150px;overflow-y:auto;font-size:0.69rem;font-family:monospace;background:var(--parchment);border:1px solid var(--border);border-radius:3px;padding:0.5rem;display:none;line-height:1.7}
.import-log .ok{color:var(--green)}.import-log .err{color:var(--red)}
.import-msg{padding:0.4rem 0.65rem;border-radius:4px;font-size:0.76rem;margin-top:0.5rem;display:none}
.import-msg.ok{background:#ddf0ec;color:var(--green);display:block}
.import-msg.err{background:#fde8e8;color:var(--red);display:block}

/* ── Map pins ── */
.flag-pin{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 5px rgba(0,0,0,0.3))}
.flag-circle{width:28px;height:28px;border-radius:50%;border:2.5px solid #fff;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1}
.flag-stem{width:2.5px;height:12px;background:#555;margin-top:-1px}
.flag-tip{width:0;height:0;border-left:3.5px solid transparent;border-right:3.5px solid transparent;border-top:5px solid #555;margin-top:-1px}
.temp-pin .flag-circle{border-color:var(--warm);box-shadow:0 0 0 3px rgba(200,135,58,0.25);animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(200,135,58,0.25)}50%{box-shadow:0 0 0 7px rgba(200,135,58,0)}}

/* ── Popup ── */
.leaflet-popup-content-wrapper{background:var(--card);border:1px solid var(--border);border-radius:4px;box-shadow:0 4px 16px rgba(26,18,8,0.12);padding:0}
.leaflet-popup-content{margin:0;font-family:'DM Sans',sans-serif}
.leaflet-popup-tip{background:var(--card)}
.pu{padding:0.65rem 0.85rem}
.pu-name{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700}
.pu-meta{font-size:0.68rem;color:var(--muted);margin-top:0.1rem}
.pu-btns{display:flex;gap:0.3rem;margin-top:0.45rem}
.pu-btn{font-size:0.67rem;padding:0.16rem 0.48rem;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:var(--parchment);font-family:'DM Sans',sans-serif;color:var(--ink)}
.pu-btn:hover{background:var(--border)}
.pu-btn.del{border-color:#fde8e8;background:#fde8e8;color:var(--red)}
</style>
</head>
<body>
<div class="layout">
<header>
  <h1>Travel <span>Admin</span></h1>
  <p>Search or click map to add · drag pins to move · double-click entry to edit</p>
</header>
<div class="body">
  <div style="position:relative;flex:1"><div id="map"></div></div>

  <div class="sidebar">
    <div class="stabs">
      <button class="stab on" id="stab-add" onclick="switchTab('add',this)">Add Pin</button>
      <button class="stab" id="stab-pins" onclick="switchTab('pins',this)">All Pins</button>
      <button class="stab" id="stab-import" onclick="switchTab('import',this)">Import</button>
    </div>

    <!-- ── ADD PIN ── -->
    <div class="panel on" id="tab-add">
      <div class="search-wrap">
        <input type="text" id="place-search" placeholder="Search place name…" autocomplete="off" oninput="onPlaceSearch()" onkeydown="onSearchKey(event)">
        <span class="search-icon">🔍</span>
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="flag-preview" id="flag-preview">
        <span id="flag-preview-emoji"></span>
        <span id="flag-preview-txt"></span>
      </div>

      <div class="hint">Search above to auto-fill, or click the map to place manually.</div>

      <div class="field"><label>Name *</label><input type="text" id="pin-name" placeholder="e.g. Amsterdam"></div>
      <div class="field">
        <label>Country</label>
        <input type="text" id="pin-country" placeholder="e.g. Netherlands" oninput="onCountryInput()">
        <input type="hidden" id="pin-country-code">
      </div>
      <div class="field">
        <label>Category</label>
        <select id="pin-cat">
          <option value="place">📍 Place</option>
          <option value="temple">🕉️ Temple</option>
          <option value="airport">✈️ Airport</option>
        </select>
      </div>
      <div class="field">
        <label>Coordinates</label>
        <div class="coord-row">
          <input type="number" id="pin-lat" placeholder="Lat" step="any">
          <input type="number" id="pin-lng" placeholder="Lng" step="any">
        </div>
      </div>
      <div class="field"><label>Notes <span style="font-weight:300;text-transform:none">(optional)</span></label><textarea id="pin-notes" placeholder="A quick note…"></textarea></div>

      <button class="btn" onclick="savePin()">Save Pin</button>
      <button class="btn ghost" id="cancel-btn" onclick="cancelEdit()" style="margin-top:0.4rem;display:none">Cancel Edit</button>
      <div class="form-msg" id="add-msg"></div>
    </div>

    <!-- ── ALL PINS ── -->
    <div class="panel" id="tab-pins">
      <input class="list-search" type="text" id="list-search" placeholder="Search pins…" oninput="renderPinList(this.value)">
      <div class="pin-list" id="pin-list"></div>
    </div>

    <!-- ── IMPORT ── -->
    <div class="panel" id="tab-import">
      <p style="font-size:0.77rem;color:var(--muted);margin-bottom:0.7rem">Upload KML or KMZ — all placemarks will be imported as pins.</p>
      <div class="upload-area" onclick="document.getElementById('kml-input').click()">
        📍 Click to upload KML / KMZ
        <input type="file" id="kml-input" accept=".kml,.kmz" style="display:none" onchange="handleKml(this)">
      </div>
      <div class="field">
        <label>Default category</label>
        <select id="import-cat">
          <option value="place">📍 Place</option>
          <option value="temple">🕉️ Temple</option>
          <option value="airport">✈️ Airport</option>
        </select>
      </div>
      <button class="btn green" id="do-import" onclick="confirmImport()" style="display:none">Import pins</button>
      <div class="import-log" id="import-log"></div>
      <div class="import-msg" id="import-msg"></div>
    </div>
  </div>
</div>
</div>

<script>

const DB_URL = 'https://script.google.com/macros/s/AKfycbwyRBVXxMuiYfxgGXa7tpFF_4e4nYACbAio935382mRYKFwqhYicUcqb0mTfWUxuuT-zw/exec';

function jsonp(url, file) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const s  = document.createElement('script');
    window[cb] = d => { delete window[cb]; s.remove(); res(d); };
    s.onerror  = () => { delete window[cb]; s.remove(); rej(); };
    s.src = url + '?file=' + file + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

async function driveRead(file) {
  const data = await jsonp(DB_URL, file);
  return { data: data };
}

async function driveWrite(file, data) {
  await fetch(DB_URL, {
    method: 'POST',
    body: JSON.stringify({ file: file, data: data })
  });
}


// ── Map setup ────────────────────────────────────────────
const map = L.map('map', {center:[20,10], zoom:3, doubleClickZoom:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CartoDB', maxZoom:19
}).addTo(map);

// Click map → place temp marker + fill coords
map.on('click', e => {
  setCoords(e.latlng.lat, e.latlng.lng);
  switchTab('add', document.getElementById('stab-add'));
});

// ── Country / emoji helpers ──────────────────────────────
const CODES = {
  'afghanistan':'af','albania':'al','algeria':'dz','andorra':'ad','angola':'ao','argentina':'ar','armenia':'am','australia':'au','austria':'at','azerbaijan':'az','bahrain':'bh','bangladesh':'bd','belarus':'by','belgium':'be','bhutan':'bt','bolivia':'bo','bosnia':'ba','botswana':'bw','brazil':'br','brunei':'bn','bulgaria':'bg','cambodia':'kh','cameroon':'cm','canada':'ca','chile':'cl','china':'cn','colombia':'co','croatia':'hr','cuba':'cu','cyprus':'cy','czech republic':'cz','czechia':'cz','denmark':'dk','ecuador':'ec','egypt':'eg','estonia':'ee','ethiopia':'et','finland':'fi','france':'fr','georgia':'ge','germany':'de','ghana':'gh','greece':'gr','hungary':'hu','iceland':'is','india':'in','indonesia':'id','iran':'ir','iraq':'iq','ireland':'ie','israel':'il','italy':'it','japan':'jp','jordan':'jo','kazakhstan':'kz','kenya':'ke','kuwait':'kw','kyrgyzstan':'kg','laos':'la','latvia':'lv','lebanon':'lb','libya':'ly','liechtenstein':'li','lithuania':'lt','luxembourg':'lu','malaysia':'my','maldives':'mv','malta':'mt','mexico':'mx','moldova':'md','monaco':'mc','mongolia':'mn','montenegro':'me','morocco':'ma','mozambique':'mz','myanmar':'mm','namibia':'na','nepal':'np','netherlands':'nl','new zealand':'nz','nicaragua':'ni','nigeria':'ng','north korea':'kp','north macedonia':'mk','norway':'no','oman':'om','pakistan':'pk','palestine':'ps','panama':'pa','paraguay':'py','peru':'pe','philippines':'ph','poland':'pl','portugal':'pt','qatar':'qa','romania':'ro','russia':'ru','rwanda':'rw','saudi arabia':'sa','senegal':'sn','serbia':'rs','singapore':'sg','slovakia':'sk','slovenia':'si','somalia':'so','south africa':'za','south korea':'kr','spain':'es','sri lanka':'lk','sudan':'sd','sweden':'se','switzerland':'ch','syria':'sy','taiwan':'tw','tajikistan':'tj','tanzania':'tz','thailand':'th','tunisia':'tn','turkey':'tr','turkmenistan':'tm','uganda':'ug','ukraine':'ua','united arab emirates':'ae','uae':'ae','united kingdom':'gb','uk':'gb','england':'gb','scotland':'gb','wales':'gb','united states':'us','usa':'us','america':'us','uruguay':'uy','uzbekistan':'uz','venezuela':'ve','vietnam':'vn','yemen':'ye','zambia':'zm','zimbabwe':'zw','hong kong':'hk','macau':'mo','kosovo':'xk','puerto rico':'pr'
};

function toCode(name) { return CODES[(name||'').toLowerCase().trim()] || ''; }

function codeToEmoji(code) {
  if (!code) return '';
  return code.toUpperCase().split('').map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
}

function countryEmoji(name, explicitCode) {
  const code = explicitCode || toCode(name);
  return codeToEmoji(code);
}

function catIcon(cat) {
  if (cat === 'temple')  return '🕉️';
  if (cat === 'airport') return '✈️';
  return null; // use flag for places
}

// ── Map pin icon ─────────────────────────────────────────
function makePin(cat, country, countryCode, isTemp) {
  const icon = catIcon(cat);
  const symbol = icon || countryEmoji(country, countryCode) || '📍';
  const html = `<div class="flag-pin${isTemp?' temp-pin':''}">
    <div class="flag-circle">${symbol}</div>
    <div class="flag-stem"></div>
    <div class="flag-tip"></div>
  </div>`;
  return L.divIcon({html, className:'', iconSize:[28,46], iconAnchor:[14,46], popupAnchor:[0,-46]});
}

// ── State ────────────────────────────────────────────────
let pins = [], editId = null, tempMarker = null, pendingImport = [];
let searchTimer = null;

// ── Temp marker ──────────────────────────────────────────
function setCoords(lat, lng) {
  document.getElementById('pin-lat').value = lat.toFixed(6);
  document.getElementById('pin-lng').value = lng.toFixed(6);
  placeTempMarker(lat, lng);
}

function placeTempMarker(lat, lng) {
  if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
  const cat  = document.getElementById('pin-cat').value;
  const name = document.getElementById('pin-country').value;
  const code = document.getElementById('pin-country-code').value;
  tempMarker = L.marker([lat, lng], {
    icon: makePin(cat, name, code, true),
    draggable: true
  }).addTo(map);
  tempMarker.on('dragend', ev => {
    const ll = ev.target.getLatLng();
    document.getElementById('pin-lat').value = ll.lat.toFixed(6);
    document.getElementById('pin-lng').value = ll.lng.toFixed(6);
  });
}

// ── Place search (Nominatim) ─────────────────────────────
function onPlaceSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('place-search').value.trim();
  if (q.length < 2) { hideSugg(); return; }
  searchTimer = setTimeout(() => geocode(q), 350);
}

async function geocode(q) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1`,
      {headers: {'Accept-Language':'en'}}
    );
    showSugg(await r.json());
  } catch(e) { hideSugg(); }
}

function showSugg(results) {
  const box = document.getElementById('suggestions');
  if (!results.length) { hideSugg(); return; }
  box._results = results;
  box.style.display = 'block';
  box.innerHTML = results.map((r, i) => {
    const name    = r.name || r.display_name.split(',')[0];
    const country = r.address?.country || '';
    const type    = r.type || r.class || '';
    return `<div class="sugg-item" onclick="selectPlace(${i})">
      <strong>${name}</strong>
      <span>${[country, type].filter(Boolean).join(' · ')}</span>
    </div>`;
  }).join('');
}

function hideSugg() { document.getElementById('suggestions').style.display = 'none'; }

function onSearchKey(e) { if (e.key === 'Escape') hideSugg(); }

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) hideSugg();
});

function selectPlace(i) {
  const r = document.getElementById('suggestions')._results?.[i];
  if (!r) return;
  hideSugg();
  const name = r.name || r.display_name.split(',')[0];
  const country = r.address?.country || '';
  const code    = r.address?.country_code?.toLowerCase() || '';
  const lat = parseFloat(r.lat), lng = parseFloat(r.lon);
  document.getElementById('pin-name').value         = name;
  document.getElementById('pin-country').value      = country;
  document.getElementById('pin-country-code').value = code;
  document.getElementById('place-search').value     = '';
  setCoords(lat, lng);
  map.setView([lat, lng], Math.max(map.getZoom(), 10));
  updateFlagPreview(country, code);
}

// ── Country input (manual) ───────────────────────────────
function onCountryInput() {
  document.getElementById('pin-country-code').value = '';
  updateFlagPreview(document.getElementById('pin-country').value, '');
  const lat = parseFloat(document.getElementById('pin-lat').value);
  const lng = parseFloat(document.getElementById('pin-lng').value);
  if (!isNaN(lat) && !isNaN(lng)) placeTempMarker(lat, lng);
}

function updateFlagPreview(country, explicitCode) {
  const emoji = countryEmoji(country, explicitCode);
  const prev  = document.getElementById('flag-preview');
  if (emoji) {
    prev.classList.add('on');
    document.getElementById('flag-preview-emoji').textContent = emoji;
    document.getElementById('flag-preview-txt').textContent   = country + (explicitCode ? ' (' + explicitCode.toUpperCase() + ')' : '');
  } else {
    prev.classList.remove('on');
  }
}

// ── Save / Edit ──────────────────────────────────────────
async function savePin() {
  const name = document.getElementById('pin-name').value.trim();
  const lat  = parseFloat(document.getElementById('pin-lat').value);
  const lng  = parseFloat(document.getElementById('pin-lng').value);
  const msg  = document.getElementById('add-msg');
  msg.className = 'form-msg';

  if (!name)          { msg.className='form-msg err'; msg.textContent='Name is required.'; return; }
  if (isNaN(lat)||isNaN(lng)) { msg.className='form-msg err'; msg.textContent='Set a location first.'; return; }

  const country     = document.getElementById('pin-country').value.trim();
  const countryCode = document.getElementById('pin-country-code').value.trim() || toCode(country);
  const category    = document.getElementById('pin-cat').value;
  const notes       = document.getElementById('pin-notes').value.trim();

  if (editId) {
    const p = pins.find(x => x.id === editId);
    if (p) Object.assign(p, {name, country, countryCode, category, lat, lng, notes});
    editId = null;
    document.getElementById('cancel-btn').style.display = 'none';
  } else {
    pins.push({id:'p'+Date.now(), name, country, countryCode, category, lat, lng, notes, addedAt:Date.now()});
  }

  await savePins();
  clearTempMarker();
  clearForm();
  renderMapPins();
  renderPinList();
  msg.className = 'form-msg ok';
  msg.textContent = '✓ Saved!';
  setTimeout(() => msg.className = 'form-msg', 2000);
}

function startEdit(id) {
  const p = pins.find(x => x.id === id);
  if (!p) return;
  editId = id;

  document.getElementById('pin-name').value         = p.name || '';
  document.getElementById('pin-country').value      = p.country || '';
  document.getElementById('pin-country-code').value = p.countryCode || '';
  document.getElementById('pin-notes').value        = p.notes || '';
  document.getElementById('pin-lat').value          = p.lat || '';
  document.getElementById('pin-lng').value          = p.lng || '';

  // Set category — check it's a valid option
  const catEl = document.getElementById('pin-cat');
  const valid = Array.from(catEl.options).map(o => o.value);
  catEl.value = valid.includes(p.category) ? p.category : 'place';

  document.getElementById('cancel-btn').style.display = 'block';
  updateFlagPreview(p.country || '', p.countryCode || '');

  if (p.lat && p.lng) {
    placeTempMarker(p.lat, p.lng);
    map.setView([p.lat, p.lng], Math.max(map.getZoom(), 9));
  }

  // Switch to Add Pin tab
  switchTab('add', document.getElementById('stab-add'));

  // Flash name field
  const el = document.getElementById('pin-name');
  el.style.borderColor = 'var(--warm)';
  setTimeout(() => el.style.borderColor = '', 1500);
}

function cancelEdit() {
  editId = null;
  clearForm();
  clearTempMarker();
  document.getElementById('cancel-btn').style.display = 'none';
}

function clearForm() {
  ['pin-name','pin-country','pin-country-code','pin-lat','pin-lng','pin-notes']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('pin-cat').value = 'place';
  document.getElementById('flag-preview').classList.remove('on');
  document.getElementById('place-search').value = '';
}

function clearTempMarker() {
  if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
}

// ── Map markers ──────────────────────────────────────────
let mapMarkers = [];

function renderMapPins() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
  pins.forEach(p => {
    if (!p.lat || !p.lng) return;
    const m = L.marker([p.lat, p.lng], {
      icon: makePin(p.category||'place', p.country||'', p.countryCode||'', false),
      draggable: true
    }).addTo(map);

    // Popup with Edit + Remove
    m.bindPopup(`<div class="pu">
      <div class="pu-name">${p.name}</div>
      <div class="pu-meta">${catIcon(p.category)||countryEmoji(p.country,p.countryCode)||''} ${p.country||''}</div>
      <div class="pu-btns">
        <button class="pu-btn" onclick="map.closePopup();startEdit('${p.id}')">✏️ Edit</button>
        <button class="pu-btn del" onclick="deletePin('${p.id}')">✕ Remove</button>
      </div>
    </div>`, {maxWidth:190});

    // Drag to reposition
    m.on('dragend', async ev => {
      const ll = ev.target.getLatLng();
      const pin = pins.find(x => x.id === p.id);
      if (pin) { pin.lat = ll.lat; pin.lng = ll.lng; await savePins(); }
    });

    mapMarkers.push(m);
  });
}

// ── All Pins list ────────────────────────────────────────
function renderPinList(filter = '') {
  const list = document.getElementById('pin-list');
  const q    = filter.toLowerCase();
  const vis  = pins.filter(p =>
    !q || p.name.toLowerCase().includes(q) || (p.country||'').toLowerCase().includes(q)
  );

  if (!vis.length) {
    list.innerHTML = '<div style="font-size:0.78rem;color:var(--muted);text-align:center;padding:1.5rem;font-style:italic">No pins yet</div>';
    return;
  }

  // Group by country
  const groups = {};
  vis.forEach(p => {
    const key = p.country || '—';
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  list.innerHTML = Object.keys(groups).sort().map(country => {
    const grp   = groups[country];
    const emoji = countryEmoji(country, grp[0].countryCode||'') || '🌍';
    const rows  = grp.map(p => `
      <div class="pin-item"
        onclick="flyTo(${p.lat},${p.lng})"
        ondblclick="startEdit('${p.id}')">
        <span class="pin-cat-icon">${catIcon(p.category)||emoji}</span>
        <div class="pin-info">
          <div class="pin-name">${p.name}</div>
        </div>
        <div class="pin-actions">
          <button class="icon-btn" title="Edit" onclick="event.stopPropagation();startEdit('${p.id}')">✏️</button>
          <button class="icon-btn del" title="Remove" onclick="event.stopPropagation();deletePin('${p.id}')">✕</button>
        </div>
      </div>`).join('');

    return `<div class="pin-group">
      <div class="pin-group-header">
        ${emoji} ${country}
        <span class="pin-count">(${grp.length})</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function flyTo(lat, lng) {
  map.setView([lat, lng], Math.max(map.getZoom(), 12));
}

async function deletePin(id) {
  if (!confirm('Remove this pin?')) return;
  pins = pins.filter(p => p.id !== id);
  await savePins();
  renderMapPins();
  renderPinList(document.getElementById('list-search').value);
}

// ── Tab switching ────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  if (btn) btn.classList.add('on');
  document.getElementById('tab-' + id).classList.add('on');
}

// ── KML import ───────────────────────────────────────────
async function handleKml(input) {
  const file = input.files[0]; if (!file) return;
  const log  = document.getElementById('import-log');
  log.style.display = 'block'; log.innerHTML = ''; pendingImport = [];

  let text;
  if (file.name.endsWith('.kmz')) {
    if (!window.JSZip) {
      await new Promise(res => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload = res; document.head.appendChild(s);
      });
    }
    const zip = await JSZip.loadAsync(await file.arrayBuffer());
    const kf  = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
    if (!kf) { log.innerHTML = '<div class="err">No KML inside KMZ</div>'; return; }
    text = await kf.async('string');
  } else {
    text = await file.text();
  }

  const xml = new DOMParser().parseFromString(text, 'text/xml');
  const pms = Array.from(xml.querySelectorAll('Placemark'));
  log.innerHTML = `<div>Found ${pms.length} placemarks…</div>`;

  pms.forEach(pm => {
    const name  = pm.querySelector('name')?.textContent?.trim() || 'Unnamed';
    const desc  = (pm.querySelector('description')?.textContent || '').trim();
    const coord = pm.querySelector('Point coordinates,coordinates')?.textContent?.trim();
    if (!coord) { log.innerHTML += `<div class="err">✗ ${name}: no coordinates</div>`; return; }
    const parts = coord.trim().split(/[\s,]+/);
    const lng = parseFloat(parts[0]), lat = parseFloat(parts[1]);
    if (isNaN(lat)||isNaN(lng)) { log.innerHTML += `<div class="err">✗ ${name}: bad coords</div>`; return; }
    pendingImport.push({
      id: 'p'+Date.now()+'_'+Math.random().toString(36).slice(2),
      name, lat, lng,
      notes: desc.replace(/<[^>]+>/g,' ').trim().substring(0,200),
      addedAt: Date.now()
    });
    log.innerHTML += `<div class="ok">✓ ${name}</div>`;
  });

  log.scrollTop = log.scrollHeight;

  if (pendingImport.length) {
    const btn = document.getElementById('do-import');
    btn.style.display = 'none';
    // Reverse geocode all pins
    log.innerHTML += `<div style="margin-top:0.3rem;color:var(--muted)">Looking up countries via Nominatim…</div>`;
    let done = 0;
    for (const p of pendingImport) {
      try {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${p.lat}&lon=${p.lng}&format=json`,
          {headers:{'Accept-Language':'en'}}
        );
        const d = await r.json();
        p.country     = d.address?.country || '';
        p.countryCode = d.address?.country_code?.toLowerCase() || '';
        log.innerHTML += `<div class="ok">🌍 ${p.name} → ${p.country||'unknown'}</div>`;
      } catch(e) {
        log.innerHTML += `<div class="err">⚠ ${p.name} — country lookup failed</div>`;
      }
      done++;
      log.scrollTop = log.scrollHeight;
      // Nominatim rate limit: 1 req/sec
      if (done < pendingImport.length) await new Promise(r => setTimeout(r, 1100));
    }
    log.innerHTML += `<div style="color:var(--muted);margin-top:0.3rem">✓ Country lookup complete</div>`;
    log.scrollTop = log.scrollHeight;
    btn.style.display = 'block';
    btn.textContent = `Import ${pendingImport.length} pins`;
  }
}

async function confirmImport() {
  const cat  = document.getElementById('import-cat').value;
  const msg  = document.getElementById('import-msg');
  const seen = new Set(pins.map(p => `${p.name}_${(p.lat||0).toFixed(3)}_${(p.lng||0).toFixed(3)}`));
  let added = 0, skipped = 0;
  pendingImport.forEach(p => {
    p.category = cat;
    const key  = `${p.name}_${p.lat.toFixed(3)}_${p.lng.toFixed(3)}`;
    if (seen.has(key)) { skipped++; return; }
    pins.push(p); added++;
  });
  await savePins();
  renderMapPins(); renderPinList();
  msg.className = 'import-msg ok';
  msg.textContent = `✓ ${added} imported${skipped ? ` · ${skipped} duplicates skipped` : ''}`;
  document.getElementById('do-import').style.display = 'none';
  pendingImport = [];
  const b = pins.filter(p=>p.lat&&p.lng).map(p=>[p.lat,p.lng]);
  if (b.length) map.fitBounds(b, {padding:[40,40]});
}

// ── Storage ──────────────────────────────────────────────
async function savePins() {
  try {
    await driveWrite('travel_pins.json', pins);
  } catch(e) { console.warn('Save failed', e); }
}

async function init() {
  try {
    const r = await driveRead('travel_pins.json'); const data = r.data;
    pins = Array.isArray(data) ? data : [];
  } catch(e) { pins = []; }
  renderMapPins();
  renderPinList();
  const b = pins.filter(p=>p.lat&&p.lng).map(p=>[p.lat,p.lng]);
  if (b.length) map.fitBounds(b, {padding:[40,40]});
}
init();
</script>
