<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* CSS Styles exactly as provided in your original template */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink:#1a1208; --parchment:#faf6ef; --warm:#c8873a; --muted:#8a7560; --card:#fff9f2; --border:#e8dfd0; --green:#2d6b5e; --red:#c0392b; }
body { font-family:'DM Sans',sans-serif; background:var(--parchment); color:var(--ink); padding:1.5rem; max-width:800px; margin:0 auto; }
h1 { font-family:'Playfair Display',serif; font-size:1.7rem; margin-bottom:0.2rem; }
h1 span { color:var(--warm); font-style:italic; }
.subtitle { color:var(--muted); font-size:0.78rem; margin-bottom:1.5rem; letter-spacing:0.06em; text-transform:uppercase; }
.card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.4rem; margin-bottom:1.2rem; }
.card-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:1rem; }
.field { margin-bottom:1rem; }
label { display:block; font-size:0.7rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); margin-bottom:0.3rem; }
input[type=text],input[type=url],input[type=date],textarea,select { width:100%; padding:0.5rem 0.75rem; border:1px solid var(--border); border-radius:4px; background:var(--parchment); font-family:'DM Sans',sans-serif; font-size:0.87rem; color:var(--ink); outline:none; transition:border-color 0.2s; }
input:focus,textarea:focus,select:focus { border-color:var(--warm); }
textarea { resize:vertical; min-height:65px; }
.btn { background:var(--warm); color:#fff; border:none; padding:0.55rem 1.4rem; border-radius:4px; font-family:'DM Sans',sans-serif; font-size:0.86rem; font-weight:500; cursor:pointer; transition:opacity 0.2s; }
.btn:hover { opacity:0.85; }
.btn:disabled { opacity:0.4; cursor:default; }
.btn.ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn.danger { background:var(--red); }
.btn.green { background:var(--green); }
.btn.sm { padding:0.3rem 0.75rem; font-size:0.76rem; }
.row { display:flex; gap:0.5rem; align-items:center; }
.msg { padding:0.6rem 0.9rem; border-radius:4px; font-size:0.82rem; margin-top:0.7rem; display:none; }
.msg.ok { background:#ddf0ec; color:var(--green); display:block; }
.msg.err { background:#fde8e8; color:var(--red); display:block; }
hr { border:none; border-top:1px solid var(--border); margin:1.5rem 0; }

nav{position:sticky;top:0;z-index:100;background:#1a1208;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:48px;margin:-1.5rem -1.5rem 1.5rem;max-width:none}
.nav-logo{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;text-decoration:none;color:#faf6ef}
.nav-logo span{color:var(--warm);font-style:italic}
.nav-links{display:flex;gap:1rem;align-items:center}
.nav-links a{font-size:0.74rem;color:rgba(250,246,239,0.5);text-decoration:none;letter-spacing:0.03em;transition:color 0.15s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:#faf6ef}
.nav-links a.active{font-weight:500}
.nav-back{font-size:0.72rem;color:rgba(250,246,239,0.5);text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;padding:0.22rem 0.6rem;border:1px solid rgba(255,255,255,0.15);border-radius:3px;transition:all 0.15s;white-space:nowrap}
.nav-back:hover{color:#faf6ef;border-color:rgba(255,255,255,0.4)}

.preview { display:none; gap:0.9rem; align-items:flex-start; padding:0.9rem; background:var(--parchment); border:1px solid var(--border); border-radius:4px; margin:0.7rem 0 1rem; }
.preview.on { display:flex; }
.preview img { width:55px; height:82px; object-fit:cover; border-radius:2px; flex-shrink:0; }
.p-title { font-family:'Playfair Display',serif; font-weight:700; font-size:0.95rem; }
.p-meta { color:var(--muted); font-size:0.76rem; margin-top:0.15rem; }
.badge { display:inline-block; font-size:0.6rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; padding:0.1rem 0.4rem; border-radius:8px; }
.badge.movie { background:#fdecd8; color:var(--warm); }
.badge.show { background:#ddf0ec; color:var(--green); }
.badge.towatch { background:#e8f0fd; color:#3a5fc8; }

.stars-row { display:flex; align-items:center; gap:0.6rem; }
.stars-input { display:flex; gap:1px; }
.stars-input span { font-size:1.25rem; cursor:pointer; color:var(--border); transition:color 0.1s; user-select:none; line-height:1; }
.stars-input span.on { color:var(--warm); }
.star-lbl { font-size:0.8rem; color:var(--muted); min-width:44px; }

.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:1.2rem; flex-wrap:wrap; }
.tab { padding:0.45rem 1.1rem; font-size:0.8rem; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; background:none; border-top:none; border-left:none; border-right:none; font-family:'DM Sans',sans-serif; white-space:nowrap; }
.tab.on { color:var(--warm); border-bottom-color:var(--warm); font-weight:500; }

.entry-list { display:flex; flex-direction:column; gap:0.6rem; }
.entry { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:0.8rem 1rem; display:flex; gap:0.8rem; align-items:center; }
.entry img { width:34px; height:51px; object-fit:cover; border-radius:2px; flex-shrink:0; }
.entry-info { flex:1; min-width:0; }
.entry-title { font-family:'Playfair Display',serif; font-size:0.86rem; font-weight:700; }
.entry-meta { font-size:0.72rem; color:var(--muted); margin-top:0.1rem; }
.entry-actions { display:flex; gap:0.4rem; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.icon-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:0.95rem; padding:0.2rem 0.35rem; border-radius:3px; transition:color 0.15s; }
.icon-btn:hover { color:var(--ink); }
.icon-btn.del:hover { color:var(--red); }
.empty { text-align:center; padding:2rem; color:var(--muted); font-style:italic; font-family:'Playfair Display',serif; }

.track-btn { background:none; border:1px solid var(--border); border-radius:12px; padding:0.15rem 0.55rem; font-size:0.65rem; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif; transition:all 0.15s; white-space:nowrap; }
.track-btn.on { background:#ddf0ec; color:var(--green); border-color:var(--green); }

.whats-new-bar { background:var(--ink); color:var(--parchment); border-radius:6px; padding:1rem 1.2rem; margin-bottom:1rem; }
.whats-new-bar h3 { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:0.8rem; display:flex; align-items:center; justify-content:space-between; }
.new-item { display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:0.8rem; }
.new-item:last-child { border-bottom:none; }
.new-item-info { flex:1 }
.new-item-title { font-weight:500; }
.new-item-desc { font-size:0.72rem; color:rgba(250,246,239,0.5); margin-top:0.1rem; }
.new-item-actions { display:flex; gap:0.4rem; }
.new-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:3px; padding:0.2rem 0.55rem; font-size:0.68rem; color:rgba(250,246,239,0.7); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.new-btn:hover { border-color:var(--warm); color:var(--warm); }
.new-btn.pull { background:var(--warm); border-color:var(--warm); color:#fff; }
.refresh-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:4px; padding:0.25rem 0.7rem; font-size:0.72rem; color:rgba(250,246,239,0.7); cursor:pointer; font-family:'DM Sans',sans-serif; }
.refresh-btn:hover { border-color:var(--warm); color:var(--warm); }
.refresh-btn:disabled { opacity:0.4; cursor:default; }

.season-tracker { margin-top:0.6rem; border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.season-tracker-toggle { display:flex; align-items:center; justify-content:space-between; padding:0.35rem 0.6rem; cursor:pointer; background:var(--parchment); font-size:0.74rem; color:var(--muted); user-select:none; }
.season-tracker-toggle:hover { background:var(--border); }
.season-tracker-toggle .tog-label { font-weight:500; }
.season-tracker-toggle .tog-arrow { font-size:0.6rem; transition:transform 0.2s; }
.season-tracker-body { display:none; padding:0.6rem; }
.season-tracker-body.on { display:block; }
.season-tracker.open .tog-arrow { transform:rotate(180deg); }
.season-tab-btn { padding:0.35rem 0.85rem; font-size:0.74rem; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; background:none; border-top:none; border-left:none; border-right:none; font-family:'DM Sans',sans-serif; white-space:nowrap; transition:color 0.15s; }
.season-tab-btn.on { color:var(--warm); border-bottom-color:var(--warm); font-weight:500; }
.season-tab-panel { display:none; padding:0.8rem 0 0; }
.season-tab-panel.on { display:block; }
.season-panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.6rem; }
.season-name { font-size:0.8rem; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); }
.ep-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:0.4rem; margin-top:0.5rem; }
.ep-item { display:flex; align-items:center; gap:0.4rem; font-size:0.76rem; cursor:pointer; padding:0.25rem 0.4rem; border-radius:3px; transition:background 0.15s; }
.ep-item:hover { background:var(--border); }
.ep-item input[type=checkbox] { accent-color:var(--warm); width:13px; height:13px; flex-shrink:0; cursor:pointer; }
.ep-item.done { color:var(--green); }
.ep-item.future { color:var(--muted); opacity:0.6; cursor:default; }
.ep-progress { font-size:0.75rem; color:var(--muted); margin-top:0.4rem; }

.overlay { display:none; position:fixed; inset:0; background:rgba(26,18,8,0.55); z-index:999; align-items:center; justify-content:center; padding:1rem; }
.overlay.on { display:flex; }
.modal { background:var(--card); border-radius:6px; max-width:480px; width:100%; padding:1.6rem; animation:pop 0.2s ease; }
@keyframes pop { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.modal h3 { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:1rem; }

.results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:0.8rem; margin-top:1rem; }
.result-card { background:var(--card); border:1px solid var(--border); border-radius:4px; overflow:hidden; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; position:relative; }
.result-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(26,18,8,0.1); }
.result-card.already { opacity:0.45; pointer-events:none; }
.result-card img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
.result-card-ph { width:100%; aspect-ratio:2/3; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:2rem; }
.result-card-info { padding:0.5rem; }
.result-card-title { font-family:'Playfair Display',serif; font-size:0.76rem; font-weight:700; line-height:1.2; margin-bottom:0.2rem; }
.result-card-meta { font-size:0.65rem; color:var(--muted); }
.result-card-add { position:absolute; bottom:0.4rem; right:0.4rem; background:var(--warm); color:#fff; border:none; border-radius:3px; padding:0.2rem 0.45rem; font-size:0.65rem; cursor:pointer; font-family:'DM Sans',sans-serif; opacity:0; transition:opacity 0.15s; }
.result-card:hover .result-card-add { opacity:1; }
.result-card.already::after { content:'✓'; position:absolute; top:0.3rem; right:0.3rem; background:var(--green); color:#fff; border-radius:99px; width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:0.65rem; }

.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1rem; align-items:start; }
.stat-block { background:var(--parchment); border:1px solid var(--border); border-radius:4px; padding:0.9rem 1rem; }
.stat-block h4 { font-size:0.68rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--warm); margin-bottom:0.7rem; }
.stat-row { display:flex; align-items:center; justify-content:space-between; padding:0.3rem 0; border-bottom:1px solid var(--border); font-size:0.8rem; cursor:pointer; transition:color 0.15s; }
.stat-row:last-child { border-bottom:none; }
.stat-row:hover { color:var(--warm); }
.stat-count { font-size:0.7rem; color:var(--muted); font-weight:500; background:var(--border); padding:0.1rem 0.4rem; border-radius:8px; }

.franchise-group { margin-bottom:1.2rem; }
.franchise-header { font-family:'Playfair Display',serif; font-size:0.95rem; font-weight:700; padding:0.5rem 0; border-bottom:1px solid var(--border); margin-bottom:0.6rem; display:flex; align-items:center; justify-content:space-between; }
.franchise-name { color:var(--ink); }
.franchise-count { font-size:0.7rem; color:var(--muted); font-weight:400; font-family:'DM Sans',sans-serif; }

.section-panel { display:none; }
.section-panel.on { display:block; }

.lang-filter-row { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1rem; }
.lang-pill { padding:0.2rem 0.65rem; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--muted); font-size:0.72rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
.lang-pill.on { background:var(--warm); color:#fff; border-color:var(--warm); }

@media(max-width:680px){
  body { padding:0.8rem; }
  nav { margin:-0.8rem -0.8rem 1rem; padding:0 1rem; }
  .nav-links a:not(.active) { display:none; }
  .tabs { gap:0.3rem; }
  .tab { font-size:0.72rem; padding:0.35rem 0.7rem; }
  .entry { flex-wrap:wrap; gap:0.5rem; }
  .entry img { width:40px; height:60px; }
  .entry-actions { width:100%; justify-content:flex-start; flex-wrap:wrap; gap:0.3rem; }
  .entry-actions .btn, .entry-actions .icon-btn, .entry-actions .track-btn { font-size:0.7rem; padding:0.25rem 0.5rem; }
  .season-panel-header { flex-wrap:wrap; gap:0.4rem; }
  .season-panel-header div { flex-wrap:wrap; gap:0.3rem; }
  .season-panel-header .btn { font-size:0.65rem !important; padding:0.2rem 0.45rem !important; }
  .ep-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
  .ep-item { font-size:0.7rem; padding:0.3rem 0.4rem; }
  .card { padding:1rem; }
  .form-row { flex-direction:column; }
  .result-grid { grid-template-columns:repeat(2,1fr) !important; }
  .result-card { font-size:0.78rem; }
}
</style>
</head>

<h1>What I've <span>Watched</span></h1>
<p class="subtitle">Admin · Manage your watchlist <span id="save-indicator" style="margin-left:1rem;font-size:0.75rem;font-weight:500"></span></p>

<div class="card" id="form-card">
  <div class="card-title" id="form-title">Add New Entry</div>
  <div style="display:flex;gap:0.5rem;margin-bottom:0.8rem">
    <button class="btn sm" id="mode-url-btn" onclick="setSearchMode('url')">Paste URL</button>
    <button class="btn sm ghost" id="mode-title-btn" onclick="setSearchMode('title')">Search by Title</button>

  <div id="title-mode" class="field" style="display:none"><label>Search by Title</label><div class="row"><input type="text" id="title-input" placeholder="e.g. Interstellar…" style="flex:1" onkeydown="if(event.key==='Enter')searchByTitle()"><select id="title-type" style="width:auto;flex-shrink:0"><option value="movie">Movie</option><option value="show">Series</option></select><button class="btn" onclick="searchByTitle()">Search</button></div><div class="results-grid" id="title-results" style="display:none"></div></div>

  <div id="show-fields" style="display:none"><div class="field"><label>Add to</label><div class="row"><label style="display:flex;align-items:center;gap:0.4rem;text-transform:none;letter-spacing:0;font-size:0.84rem;cursor:pointer"><input type="radio" name="add-dest-s" value="watched" checked> Watching / Watched</label><label style="display:flex;align-items:center;gap:0.4rem;text-transform:none;letter-spacing:0;font-size:0.84rem;cursor:pointer"><input type="radio" name="add-dest-s" value="towatch"> To Watch</label></div></div><div class="field"><label>Overall Review</label><textarea id="s-review" placeholder="Overall thoughts…"></textarea></div><div class="field"><label>Language</label><input type="text" id="s-language" placeholder="e.g. English"></div></div>
  <div style="display:flex;gap:0.6rem;margin-top:0.5rem"><button class="btn" id="submit-btn" onclick="submitEntry()" style="display:none">Add to Watchlist</button><button class="btn ghost" id="cancel-edit-btn" onclick="cancelEdit()" style="display:none">Cancel</button></div>

<script>
const DB_URL = 'https://script.google.com/macros/s/AKfycby_4wXklgbSrz3G0dE0_DmVp9SgXobdjYYWnLu9aa4gVHB974v0rq52DN11Ew1PQDnluw/exec';
const TMDB_KEY = '60a9d5e588c206cf1d895394aa72d581';

// ── ADMIN ANALYTICS TRACKING ──────────────────────────────────
function trackAdminAction(actionName) {
    let uid = localStorage.getItem('_rsuid');
    if (!uid) { 
        uid = 'admin_' + Date.now(); 
        localStorage.setItem('_rsuid', uid); 
    }
    const pagePath = `admin_watchlist_${actionName}`;
    fetch(`${DB_URL}?action=visit&page=${encodeURIComponent(pagePath)}&uid=${uid}`)
        .catch(() => { /* Silent failure for tracking */ });
}

// ── DRIVE OPERATIONS ──────────────────────────────────────────
function jsonp(url, file) {
  return new Promise((res, rej) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    window[cb] = d => { delete window[cb]; s.remove(); res(d); };
    s.onerror = () => { delete window[cb]; s.remove(); rej(); };
    s.src = url + '?file=' + file + '&callback=' + cb;
    document.head.appendChild(s);
  });
}

async function driveRead(file) { 
    return { data: await jsonp(DB_URL, file) };
