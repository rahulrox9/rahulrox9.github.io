<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Subbaraman</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #faf6ef; /* Matches your --parchment theme */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <script>
        // 1. Get the target page from the URL (?p=pagename.html)
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('p') || 'home.html';

        // 2. "Clean" the URL immediately so the user only sees the base URL
        if (window.location.search) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // 3. Create the iframe pointing to the target
        document.write(`<iframe src="${target}" name="main_frame" id="main_frame"></iframe>`);
    </script>
    <script>
  // Detect admin flag from the main URL
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === 'true') {
    localStorage.setItem('admin_ignore', 'true');
    alert('Admin mode activated for this browser.');
  }
</script>
</body>
</html>
