<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Subbaraman</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #faf6ef; /* Matches your --parchment theme */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <body>
    <script>
        // 1. Extract the target page from the URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('p') || 'Public/home.html';
        // 2. Wipe the URL bar immediately so the user sees only the base URL
        if (window.location.search) {
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        // 3. Inject the iframe pointing to the specific page
        document.write(`<iframe src="${target}" name="main_frame" id="main_frame"></iframe>`);
    </script>
</body>
</html>
