<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="Bz6zv7cr-ElSuXhlCo14kCG7AkWucs0h9YzxevdRhqQ" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Subbaraman</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #faf6ef;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
<script>
    const DB = 'https://script.google.com/macros/s/AKfycbzpa1fUDZDXfQT5L6SxQRNf1zEFk-tpHV_2Tq9CY2iG4iSqa4W__Rnqs6fshnGJ0pnvRQ/exec';

    const urlParams = new URLSearchParams(window.location.search);
    const p = urlParams.get('p');

    // ── No ?p= → redirect to ?p=Public/home.html so it gets tracked ──
    if (!p) {
        window.location.replace('/?p=Public/home.html');
    } else {
        // ── Has ?p= → track the visit ──
        let uid = localStorage.getItem('_rsuid');
        if (!uid) {
            uid = 'u' + Date.now() + Math.random().toString(36).slice(2, 7);
            localStorage.setItem('_rsuid', uid);
        }

        const sessionKey = 'counted_' + p;
        if (!sessionStorage.getItem(sessionKey)) {
            fetch(DB + '?action=visit&page=' + encodeURIComponent(p) + '&uid=' + encodeURIComponent(uid) + '&ref=' + encodeURIComponent(document.referrer))
                .then(function() { sessionStorage.setItem(sessionKey, 'true'); })
                .catch(function() {});
        }

        // ── Clean URL bar then load page in iframe ──
        window.history.replaceState({}, document.title, window.location.pathname);
        document.write('<iframe src="' + p + '" name="main_frame" id="main_frame"></iframe>');
    }
</script>
</body>
</html>
