<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul's Writing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1208;--parchment:#faf6ef;--warm:#c8873a;--muted:#8a7560;--card:#fff9f2;--border:#e8dfd0;--green:#2d6b5e}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.35}

nav{position:sticky;top:0;z-index:100;background:rgba(250,246,239,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;color:var(--ink)}
.nav-logo span{color:var(--warm);font-style:italic}
.nav-links{display:flex;gap:1.4rem;align-items:center}
.nav-links a{font-size:0.76rem;color:var(--muted);text-decoration:none;letter-spacing:0.03em;transition:color 0.15s}
.nav-links a:hover{color:var(--warm)}
.nav-links a.active{color:var(--ink);font-weight:500}
.nav-admin{font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;padding:0.25rem 0.65rem;border:1px solid var(--border);border-radius:3px;transition:all 0.15s}
.nav-admin:hover{color:var(--warm);border-color:var(--warm)}

@media(max-width:680px){nav{padding:0 1.2rem}.nav-links a:not(.active):not(.nav-admin){display:none}.nav-admin{display:flex!important}}

.page-header{max-width:1200px;margin:0 auto;padding:4rem 4rem 2rem}
.eyebrow{font-size:0.68rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--warm);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.6rem}
.eyebrow::before{content:'';display:inline-block;width:24px;height:1px;background:var(--warm)}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,4vw,4rem);font-weight:700;line-height:1.05;letter-spacing:-0.02em;margin-bottom:1rem}
.page-title em{font-style:italic;color:var(--warm)}
.page-desc{font-size:0.9rem;color:var(--muted);line-height:1.8;max-width:540px;font-weight:300}

.tag-bar{max-width:1200px;margin:0 auto;padding:0 4rem 2.5rem;display:flex;gap:0.5rem;flex-wrap:wrap}
.tag-btn{padding:0.25rem 0.8rem;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap}
.tag-btn.on{background:var(--warm);color:#fff;border-color:var(--warm)}
.tag-btn:hover:not(.on){border-color:var(--warm);color:var(--warm)}

.posts-wrap{max-width:1200px;margin:0 auto;padding:0 4rem 6rem}
.posts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}

.section-header{
    grid-column: 1 / -1;
    background: var(--parchment);
    padding: 2.5rem 1.8rem 1rem;
    border-bottom: 1px solid var(--border);
}
.section-header h2{
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.post-card{background:var(--card);padding:2rem 1.8rem;text-decoration:none;color:var(--ink);display:flex;flex-direction:column;transition:background 0.2s;position:relative}
.post-card:hover{background:var(--parchment)}
.post-card:hover .post-arrow{transform:translate(3px,-3px)}
.post-tag{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--warm);margin-bottom:0.6rem;font-weight:500}
.post-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;line-height:1.3;margin-bottom:0.6rem}
.post-excerpt{font-size:0.8rem;color:var(--muted);line-height:1.65;flex:1;font-weight:300}
.post-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.2rem}
.post-date{font-size:0.7rem;color:var(--muted)}
.post-arrow{font-size:0.8rem;color:var(--warm);transition:transform 0.2s}
.post-featured { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: #fff;  background: var(--green);
  display: inline-block;  padding: 2px 6px;  margin-bottom: 0.5rem;  border-radius: 3px;}

footer{padding:2.5rem 4rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.footer-left{font-family:'Playfair Display',serif;font-size:0.9rem;font-style:italic;color:var(--muted)}
.footer-right{display:flex;gap:1.8rem}
.footer-right a{font-size:0.75rem;color:var(--muted);text-decoration:none;transition:color 0.15s}
.footer-right a:hover{color:var(--warm)}

@media(max-width:900px){
  .page-header,.tag-bar,.posts-wrap{padding-left:1.5rem;padding-right:1.5rem}
  .posts-grid{grid-template-columns:1fr}
  footer{padding:1.5rem;flex-direction:column;gap:1rem;text-align:center}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../index.html">Rahul <span>Subbaraman</span></a>
  <div class="nav-links">

</nav>

<div class="page-header">
  <div class="eyebrow">Writing</div>
  <h1 class="page-title">Things I've<br><em>written</em></h1>
  <p class="page-desc">Articles, poems, stories and whatever else demands to be written.</p>
</div>

<div class="tag-bar" id="tag-bar"></div>

<div class="posts-wrap">
  <div class="posts-grid" id="posts-grid"></div>
</div>

<footer>
  <div class="footer-left">Rahul Subbaraman</div>
  <div class="footer-right">
    <a href="?p=watchlist.html">Watchlist</a>
    <a href="?p=travel.html">Travels</a>
    <a href="?p=books.html">Bookshelf</a>
  </div>
</footer>

<script>
const POSTS = [
  {
    file: '../?p=Writing/Poems/mama-mata.html',
    tag: ['Sanskrit','Poetry'],
    title: 'मम माता (My Mother)',
    excerpt: "A Sanskrit poem about a mother's boundless love, written in the classical style, with an English rendering alongside.",
    date: 'Oct 2014',
    featured: false,
  },
  {
    file: '../?p=Writing/Poems/love.html',
    tag: ['English','Poetry'],
    title: 'Love',
    excerpt: "A poem defining love through its permanence and its ultimate culmination in humanitarian and spiritual devotion.",
    date: 'Feb 2014',
    featured: false,
  },
  {
    file: '../?p=Writing/Poems/love.html',
    tag: ['English','Poetry'],
    title: 'Satyam Vada Dharmam Cara',
    excerpt: "A poem I wrote based on the ancient Sanskrit maxim from Taittiriya Upanishad, which won me the 2nd prize in an inter-school poetry competition.",
    date: '2014',
    featured: false,
  },
  {
    file: '../?p=Writing/Articles/Using_the_knife.html',
    tag: ['English', 'Article', 'Miscellaneous', 'Culinary'],
    title: 'A guide to amateur cooking. Part 1: French classical knife skills',
    excerpt: "An introduction to fundamental French classical knife skills, exploring techniques from basic chopping to precise julienne and brunoise cuts.",
    date: '15 Dec 2020',
    featured: false,
  },
 {
    file: '../?p=Writing/Indic/Anatomy_Time.html',
    tag: ['English', 'Sanskrit', 'Indic', 'Vedic Science'],
    title: 'Kālavidyā: The Science of Time in Sanātana Dharma | Part 1: The Anatomy of Time',
    excerpt: "From the 4-second flutter of a human breath (Prāṇa) to the quadrillion-year lifespan of the Creator, the Sūryasiddhānta constructs a seamless anatomy of time. Discover how ancient Vedic astronomy bridges the infinitesimal and the infinite, mapping our exact coordinates in a cosmic cycle.",
    date: '29 Mar 2026',
    featured: false,
  }
];

let activeTag = 'all';

function createPostHTML(p) {
  return `<a class="post-card" href="${p.file}">
      <div>
        <div class="post-tag">${p.tag.join(' · ')}</div>
        ${p.featured ? '<div class="post-featured">Featured</div>' : ''}
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
      </div>
      <div class="post-footer">
        <span class="post-date">${p.date}</span>
        <span class="post-arrow">↗</span>
      </div>
    </a>`;
}

function render() {
  const grid = document.getElementById('posts-grid');
  const filtered = activeTag === 'all' ? POSTS : POSTS.filter(p => p.tag.includes(activeTag));

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">No posts yet — coming soon.</div>';
    return;
  }

      // Grouping Logic
  const featured = filtered.filter(p => p.featured);
  const sci_comm = filtered.filter(p => p.tag.includes('Sci-Comm') && !p.featured);
 const indic = filtered.filter(p => p.tag.includes('Indic') && !p.featured);
  const misc = filtered.filter(p => p.tag.includes('Miscellaneous') && !p.featured);
  const poetry = filtered.filter(p => p.tag.includes('Poetry') && !p.featured);
  
  let finalHTML = '';
  if (featured.length > 0) {
  finalHTML += `<div class="section-header"><h2>Featured</h2></div>`;
  finalHTML += featured.map(p => createPostHTML(p)).join('');
}

  if (sci_comm.length > 0) {
    finalHTML += `<div class="section-header"><h2>Sci-Comm Articles</h2></div>`;
    finalHTML += sci_comms.map(p => createPostHTML(p)).join('');
  }

  if (indic.length > 0) {
    finalHTML += `<div class="section-header"><h2>Indic Articles</h2></div>`;
    finalHTML += indic.map(p => createPostHTML(p)).join('');
  }

  if (misc.length > 0) {
    finalHTML += `<div class="section-header"><h2>Miscellaneous Articles</h2></div>`;
    finalHTML += misc.map(p => createPostHTML(p)).join('');
  }

  if (poetry.length > 0) {
    finalHTML += `<div class="section-header"><h2>Poetry</h2></div>`;
    finalHTML += poetry.map(p => createPostHTML(p)).join('');
  }

  grid.innerHTML = finalHTML;

  // Render Tags
  const tags = ['all', ...new Set(POSTS.flatMap(p => p.tag))];
  document.getElementById('tag-bar').innerHTML = tags.map(t =>
    `<button class="tag-btn${t===activeTag?' on':''}" onclick="filterTag('${t}',this)">${t==='all'?'All':t}</button>`
  ).join('');
}

function filterTag(tag, btn) {
  activeTag = tag;
  render();
}
render();
</script>
    
<script>
(function(){
  // 1. Only track if viewed inside the index.html frame
  if (window.self === window.top) return;

  const page = window.location.pathname;
  const sessionKey = 'counted_' + page;

  // 2. Check if this page was already counted in this session
  if (sessionStorage.getItem(sessionKey)) {
    console.log('Page already counted in this session. Skipping.');
    return;
  }

  // 3. Admin ignore flag (Optional)
  if (localStorage.getItem('admin_ignore') === 'true') return;

  const DB = 'https://script.google.com/macros/s/AKfycbzpa1fUDZDXfQT5L6SxQRNf1zEFk-tpHV_2Tq9CY2iG4iSqa4W__Rnqs6fshnGJ0pnvRQ/exec';
  
  // Unique User ID (for "Unique Visitors" stat)
  let uid = localStorage.getItem('_rsuid');
  if (!uid) { 
    uid = 'u' + Date.now() + Math.random().toString(36).slice(2,7); 
    localStorage.setItem('_rsuid', uid); 
  }

  // 4. Send the visit and set the session flag
  fetch(`${DB}?action=visit&page=${encodeURIComponent(page)}&uid=${uid}`)
    .then(() => {
      sessionStorage.setItem(sessionKey, 'true');
    })
    .catch(err => console.error('Tracking failed', err));
})();
</script>
    
</body>
