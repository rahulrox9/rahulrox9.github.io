<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul's Bookshelf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1208;--parchment:#faf6ef;--warm:#c8873a;--muted:#8a7560;--card:#fff9f2;--border:#e8dfd0;--green:#2d6b5e}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh;padding-bottom:3rem}
nav{position:sticky;top:0;z-index:50;background:rgba(250,246,239,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:52px}.nav-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;color:var(--ink)}.nav-logo span{color:var(--warm);font-style:italic}.nav-links{display:flex;gap:1.35rem;align-items:center}.nav-links a{font-size:.76rem;color:var(--muted);text-decoration:none}.nav-links a.active{color:var(--ink);font-weight:500}.nav-admin{padding:.25rem .65rem;border:1px solid var(--border);border-radius:3px;text-transform:uppercase;font-size:.7rem!important}
.hero{max-width:1180px;margin:0 auto;padding:3.1rem 1.5rem 1.6rem;text-align:center}.eyebrow{font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;color:var(--warm);margin-bottom:.55rem}.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.8rem);line-height:1}.hero h1 span{color:var(--warm);font-style:italic}.hero p{color:var(--muted);font-size:.84rem;margin-top:.8rem}.hero-stats{display:flex;justify-content:center;gap:1.2rem;margin-top:1.15rem;flex-wrap:wrap}.hero-stat{font-size:.72rem;color:var(--muted)}.hero-stat strong{font-family:'Playfair Display',serif;color:var(--ink);font-size:1rem;margin-right:.2rem}
main{max-width:1180px;margin:0 auto;padding:0 1.5rem}.toolbar{display:flex;gap:.6rem;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}.search-wrap{position:relative;flex:1;max-width:390px;min-width:220px}.search-wrap span{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem}.search-wrap input,.sort{width:100%;border:1px solid var(--border);background:var(--card);border-radius:22px;padding:.56rem .9rem;font:400 .82rem 'DM Sans';color:var(--ink);outline:none}.search-wrap input{padding-left:2.25rem}.sort{width:auto;color:var(--muted);cursor:pointer}.search-wrap input:focus,.sort:focus{border-color:var(--warm)}
.genre-pills{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem}.pill{border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:99px;padding:.26rem .72rem;font:400 .71rem 'DM Sans';cursor:pointer}.pill.on{background:var(--warm);border-color:var(--warm);color:#fff}.results{text-align:center;color:var(--muted);font-size:.72rem;margin-bottom:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1rem}.book-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:grid;grid-template-columns:108px minmax(0,1fr);min-height:170px;cursor:pointer;transition:transform .18s,box-shadow .18s;animation:fadeUp .35s ease both}.book-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(26,18,8,.1)}.cover{width:108px;height:100%;min-height:170px;object-fit:cover;background:var(--border)}.cover-ph{width:108px;min-height:170px;display:flex;align-items:center;justify-content:center;font-size:2rem;background:linear-gradient(135deg,var(--border),#d5c8b5)}.book-content{padding:.9rem 1rem;display:flex;flex-direction:column;min-width:0}.genre{display:inline-block;width:fit-content;border-radius:9px;background:#fdebd6;color:var(--warm);font-size:.59rem;text-transform:uppercase;letter-spacing:.05em;padding:.12rem .42rem;margin-bottom:.4rem}.title{font-family:'Playfair Display',serif;font-size:1.03rem;font-weight:700;line-height:1.25}.author{font-size:.74rem;color:var(--muted);margin-top:.18rem}.rating-line{display:flex;align-items:center;gap:.55rem;margin-top:.62rem}.rating{font-family:'Playfair Display',serif;color:var(--warm);font-size:1.25rem;font-weight:700}.rating small{font:300 .63rem 'DM Sans';color:var(--muted)}.rating-bar{height:4px;flex:1;background:var(--border);border-radius:99px;overflow:hidden}.rating-fill{height:100%;background:var(--warm)}.review{font-size:.74rem;color:#5a4e3f;font-style:italic;line-height:1.48;margin-top:.55rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.details{font-size:.68rem;color:var(--muted);margin-top:auto;padding-top:.55rem}
.empty,.loading{text-align:center;padding:4rem;color:var(--muted);font-family:'Playfair Display',serif;font-style:italic;grid-column:1/-1}
.overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.62);z-index:100;align-items:center;justify-content:center;padding:1rem}.overlay.on{display:flex}.modal{background:var(--card);width:min(620px,100%);max-height:90vh;overflow:auto;border-radius:10px;position:relative}.close{position:absolute;right:.8rem;top:.7rem;border:none;background:rgba(255,255,255,.85);border-radius:99px;width:31px;height:31px;cursor:pointer;font-size:1rem;z-index:2}.modal-top{display:grid;grid-template-columns:155px minmax(0,1fr);gap:1.2rem;padding:1.25rem}.modal-cover{width:155px;height:232px;object-fit:cover;border-radius:5px;background:var(--border)}.modal h2{font-family:'Playfair Display',serif;font-size:1.5rem;line-height:1.2;margin-top:.25rem}.modal-author{color:var(--muted);font-size:.82rem;margin-top:.3rem}.modal-rating{font-family:'Playfair Display',serif;color:var(--warm);font-size:1.6rem;font-weight:700;margin-top:.75rem}.modal-rating small{font:300 .7rem 'DM Sans';color:var(--muted)}.modal-meta{font-size:.75rem;color:var(--muted);margin-top:.55rem;line-height:1.55}.modal-body{padding:0 1.25rem 1.3rem}.section-label{font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem}.modal-review{font-family:'Playfair Display',serif;font-style:italic;line-height:1.65;font-size:.92rem;color:#4e4336}.goodreads-link{display:inline-block;margin-top:1rem;color:var(--warm);text-decoration:none;font-size:.78rem}
footer{text-align:center;margin-top:3rem;padding-top:1.2rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){nav{padding:0 1rem}.nav-links a:not(.active):not(.nav-admin){display:none}.hero{padding:2.2rem 1rem 1.3rem}main{padding:0 .85rem}.grid{grid-template-columns:1fr}.book-card{grid-template-columns:88px minmax(0,1fr);min-height:142px}.cover,.cover-ph{width:88px;min-height:142px}.book-content{padding:.75rem}.modal-top{grid-template-columns:95px minmax(0,1fr);gap:.85rem}.modal-cover{width:95px;height:143px}.modal h2{font-size:1.2rem}.toolbar{align-items:stretch}.sort{width:100%}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Rahul <span>Subbaraman</span></a>
  <div class="nav-links">
    <a href="watchlist.html">Watchlist</a><a href="travel.html">Travels</a><a class="active" href="books.html">Bookshelf</a><a href="magnets.html">Magnets</a><a href="postcards.html">Postcards</a><a href="blog.html">Writing</a><a class="nav-admin" href="../Admin/admin.html">Admin</a>
  </div>
</nav>
<header class="hero">
  <div class="eyebrow">Reading archive</div>
  <h1>Rahul's <span>Bookshelf</span></h1>
  <p>Books I have read, rated and reviewed.</p>
  <div class="hero-stats"><span class="hero-stat"><strong id="count">0</strong>books</span><span class="hero-stat"><strong id="average">—</strong>average rating</span><span class="hero-stat"><strong id="updated">—</strong>last updated</span></div>
</header>
<main>
  <div class="toolbar">
    <div class="search-wrap"><span>🔍</span><input id="search" type="search" placeholder="Search title, author or review…" oninput="render()"></div>
    <select class="sort" id="sort" onchange="render()"><option value="read-desc">Newest read</option><option value="read-asc">Oldest read</option><option value="rating-desc">Highest rated</option><option value="rating-asc">Lowest rated</option><option value="title-asc">Title A–Z</option><option value="author-asc">Author A–Z</option><option value="published-desc">Publication year</option></select>
  </div>
  <div class="genre-pills" id="genre-pills"></div>
  <div class="results" id="results"></div>
  <div class="grid" id="grid"><div class="loading">Opening the shelves…</div></div>
</main>
<div class="overlay" id="overlay" onclick="closeModal(event)"><article class="modal"><button class="close" onclick="closeModal()">×</button><div id="modal-content"></div></article></div>
<footer>Ratings are shown out of 10.</footer>
<script>
const DB_URL='https://script.google.com/macros/s/AKfycbwyRBVXxMuiYfxgGXa7tpFF_4e4nYACbAio935382mRYKFwqhYicUcqb0mTfWUxuuT-zw/exec';
const BOOKS_FILE='books.json';
let database={books:[],updatedAt:0};
let activeGenre='All';
function jsonp(url,file){return new Promise((res,rej)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');window[cb]=d=>{delete window[cb];s.remove();res(d)};s.onerror=()=>{delete window[cb];s.remove();rej(new Error('Read failed'))};s.src=url+'?file='+encodeURIComponent(file)+'&callback='+encodeURIComponent(cb)+'&_='+Date.now();document.head.appendChild(s)})}
function escapeHtml(v=''){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function normalise(v){if(Array.isArray(v))return {books:v,updatedAt:0};if(v&&Array.isArray(v.books))return v;return {books:[],updatedAt:0}}
function formatDate(iso){if(!iso)return '';const d=new Date(iso+'T00:00:00');if(Number.isNaN(d.getTime()))return iso;return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function formatUpdated(ts){if(!ts)return '—';const d=new Date(ts);return Number.isNaN(d.getTime())?'—':d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
async function load(){try{database=normalise(await jsonp(DB_URL,BOOKS_FILE))}catch(e){try{const r=await fetch('./books.json?ts='+Date.now(),{cache:'no-store'});database=normalise(await r.json())}catch(_){database=normalise(null)}}updateHeader();buildGenres();render()}
function updateHeader(){const rated=database.books.filter(b=>Number(b.rating10)>0);const avg=rated.length?rated.reduce((s,b)=>s+Number(b.rating10||0),0)/rated.length:0;document.getElementById('count').textContent=database.books.length;document.getElementById('average').textContent=avg?avg.toFixed(1)+'/10':'—';document.getElementById('updated').textContent=formatUpdated(database.updatedAt)}
function buildGenres(){const genres=['All',...new Set(database.books.map(b=>b.genre).filter(Boolean).sort((a,b)=>a.localeCompare(b)))];document.getElementById('genre-pills').innerHTML=genres.map(g=>`<button class="pill ${g===activeGenre?'on':''}" onclick="setGenre('${escapeHtml(g).replace(/'/g,"\\'")}')">${escapeHtml(g)}</button>`).join('')}
function setGenre(g){activeGenre=g;buildGenres();render()}
function sortedBooks(){const q=(document.getElementById('search').value||'').toLowerCase().trim();const sort=document.getElementById('sort').value;const books=database.books.filter(b=>(activeGenre==='All'||b.genre===activeGenre)&&(!q||[b.title,b.author,b.review,b.genre].some(v=>(v||'').toLowerCase().includes(q))));books.sort((a,b)=>{switch(sort){case'read-desc':return(b.readDate||'').localeCompare(a.readDate||'');case'read-asc':return(a.readDate||'').localeCompare(b.readDate||'');case'rating-desc':return(Number(b.rating10)||0)-(Number(a.rating10)||0);case'rating-asc':return(Number(a.rating10)||0)-(Number(b.rating10)||0);case'title-asc':return(a.title||'').localeCompare(b.title||'');case'author-asc':return(a.author||'').localeCompare(b.author||'');case'published-desc':return(Number(b.publishedYear)||0)-(Number(a.publishedYear)||0);default:return 0}});return books}
function render(){const books=sortedBooks();document.getElementById('results').textContent=books.length===database.books.length?`${database.books.length} books`:`${books.length} of ${database.books.length} books`;const grid=document.getElementById('grid');if(!books.length){grid.innerHTML='<div class="empty">No books match your filters.</div>';return}grid.innerHTML=books.map((b,i)=>`<article class="book-card" style="animation-delay:${Math.min(i*.025,.4)}s" onclick="openModal('${escapeHtml(b.id)}')">${b.cover?`<img class="cover" src="${escapeHtml(b.cover)}" alt="${escapeHtml(b.title)}" loading="lazy">`:'<div class="cover-ph">📖</div>'}<div class="book-content">${b.genre?`<span class="genre">${escapeHtml(b.genre)}</span>`:''}<div class="title">${escapeHtml(b.title)}</div><div class="author">${escapeHtml(b.author)}</div>${Number(b.rating10)>0?`<div class="rating-line"><div class="rating">${Number(b.rating10).toFixed(Number(b.rating10)%1?1:0)}<small>/10</small></div><div class="rating-bar"><div class="rating-fill" style="width:${Math.max(0,Math.min(100,Number(b.rating10)*10))}%"></div></div></div>`:''}${b.review?`<div class="review">“${escapeHtml(b.review)}”</div>`:''}<div class="details">${b.readDate?'Read '+escapeHtml(formatDate(b.readDate)):''}${b.publishedYear?`${b.readDate?' · ':''}Published ${escapeHtml(b.publishedYear)}`:''}</div></div></article>`).join('')}
function openModal(id){const b=database.books.find(x=>x.id===id);if(!b)return;document.getElementById('modal-content').innerHTML=`<div class="modal-top">${b.cover?`<img class="modal-cover" src="${escapeHtml(b.cover)}" alt="${escapeHtml(b.title)}">`:'<div class="modal-cover"></div>'}<div>${b.genre?`<span class="genre">${escapeHtml(b.genre)}</span>`:''}<h2>${escapeHtml(b.title)}</h2><div class="modal-author">${escapeHtml(b.author)}</div>${Number(b.rating10)>0?`<div class="modal-rating">${Number(b.rating10).toFixed(Number(b.rating10)%1?1:0)}<small>/10</small></div>`:''}<div class="modal-meta">${b.readDate?'Read '+escapeHtml(formatDate(b.readDate))+'<br>':''}${b.publishedYear?'First published '+escapeHtml(b.publishedYear)+'<br>':''}${b.isbn13?'ISBN '+escapeHtml(b.isbn13):''}</div></div></div><div class="modal-body">${b.review?`<div class="section-label">My review</div><div class="modal-review">“${escapeHtml(b.review)}”</div>`:''}${b.link?`<a class="goodreads-link" href="${escapeHtml(b.link)}" target="_blank" rel="noopener">View on Goodreads →</a>`:''}</div>`;document.getElementById('overlay').classList.add('on')}
function closeModal(e){if(e&&e.target!==document.getElementById('overlay'))return;document.getElementById('overlay').classList.remove('on')}
load();
</script>
</body>
</html>
