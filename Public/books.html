<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul's Bookshelf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1208;--parchment:#faf6ef;--warm:#c8873a;--muted:#8a7560;--card:#fff9f2;--border:#e8dfd0;--green:#2d6b5e;--purple:#72549a}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh;padding-bottom:3rem}
nav{position:sticky;top:0;z-index:50;background:rgba(250,246,239,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2.5rem;display:flex;align-items:center;justify-content:space-between;height:52px}.nav-logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;text-decoration:none;color:var(--ink)}.nav-logo span{color:var(--warm);font-style:italic}.nav-links{display:flex;gap:1.35rem;align-items:center}.nav-links a{font-size:.76rem;color:var(--muted);text-decoration:none}.nav-links a.active{color:var(--ink);font-weight:500}.nav-admin{padding:.25rem .65rem;border:1px solid var(--border);border-radius:3px;text-transform:uppercase;font-size:.7rem!important}
.hero{max-width:1180px;margin:0 auto;padding:3rem 1.5rem 1.5rem;text-align:center}.eyebrow{font-size:.67rem;text-transform:uppercase;letter-spacing:.16em;color:var(--warm);margin-bottom:.55rem}.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.7rem);line-height:1}.hero h1 span{color:var(--warm);font-style:italic}.hero p{color:var(--muted);font-size:.84rem;margin-top:.8rem}.hero-stats{display:flex;justify-content:center;gap:1.2rem;margin-top:1.1rem;flex-wrap:wrap}.hero-stat{font-size:.7rem;color:var(--muted)}.hero-stat strong{font-family:'Playfair Display',serif;color:var(--ink);font-size:1rem;margin-right:.2rem}
main{max-width:1180px;margin:0 auto;padding:0 1.5rem}.toolbar{display:flex;gap:.55rem;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:.8rem}.search-wrap{position:relative;flex:1;max-width:420px;min-width:220px}.search-wrap span{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem}.search-wrap input,.control{border:1px solid var(--border);background:var(--card);border-radius:22px;padding:.55rem .8rem;font:400 .8rem 'DM Sans';color:var(--ink);outline:none}.search-wrap input{width:100%;padding-left:2.25rem}.control{cursor:pointer;color:var(--muted)}.search-wrap input:focus,.control:focus{border-color:var(--warm)}
.genre-pills{display:flex;gap:.38rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}.pill{border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:99px;padding:.25rem .68rem;font:400 .7rem 'DM Sans';cursor:pointer}.pill.on{background:var(--warm);border-color:var(--warm);color:#fff}.results{text-align:center;color:var(--muted);font-size:.71rem;margin-bottom:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1rem}.book-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:grid;grid-template-columns:108px minmax(0,1fr);min-height:170px;cursor:pointer;transition:transform .18s,box-shadow .18s;animation:fadeUp .35s ease both}.book-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(26,18,8,.1)}.cover{width:108px;height:100%;min-height:170px;object-fit:cover;background:var(--border)}.cover-ph{width:108px;min-height:170px;display:flex;align-items:center;justify-content:center;font-size:2rem;background:linear-gradient(135deg,var(--border),#d5c8b5)}.book-content{padding:.88rem .95rem;display:flex;flex-direction:column;min-width:0}.chips{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.38rem}.genre{display:inline-block;border-radius:9px;background:#fdebd6;color:var(--warm);font-size:.57rem;text-transform:uppercase;letter-spacing:.05em;padding:.11rem .4rem}.tag{background:#ece7f4;color:var(--purple)}.title{font-family:'Playfair Display',serif;font-size:1.02rem;font-weight:700;line-height:1.25}.author{font-size:.73rem;color:var(--muted);margin-top:.18rem}.rating-line{display:flex;align-items:center;gap:.55rem;margin-top:.58rem}.rating{font-family:'Playfair Display',serif;color:var(--warm);font-size:1.22rem;font-weight:700}.rating small{font:300 .62rem 'DM Sans';color:var(--muted)}.rating-bar{height:4px;flex:1;background:var(--border);border-radius:99px;overflow:hidden}.rating-fill{height:100%;background:var(--warm)}.review{font-size:.73rem;color:#5a4e3f;font-style:italic;line-height:1.48;margin-top:.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.details{font-size:.67rem;color:var(--muted);margin-top:auto;padding-top:.5rem}.empty,.loading{text-align:center;padding:4rem;color:var(--muted);font-family:'Playfair Display',serif;font-style:italic;grid-column:1/-1}
.overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.62);z-index:100;align-items:center;justify-content:center;padding:1rem}.overlay.on{display:flex}.modal{background:var(--card);width:min(680px,100%);max-height:92vh;overflow:auto;border-radius:10px;position:relative}.close{position:absolute;right:.8rem;top:.7rem;border:none;background:rgba(255,255,255,.9);border-radius:99px;width:31px;height:31px;cursor:pointer;font-size:1rem;z-index:2}.modal-top{display:grid;grid-template-columns:155px minmax(0,1fr);gap:1.2rem;padding:1.25rem}.modal-cover{width:155px;height:232px;object-fit:cover;border-radius:5px;background:var(--border)}.modal-cover-ph{width:155px;height:232px;display:flex;align-items:center;justify-content:center;background:var(--border);font-size:2rem}.modal h2{font-family:'Playfair Display',serif;font-size:1.5rem;line-height:1.2;margin-top:.25rem}.modal-author{color:var(--muted);font-size:.82rem;margin-top:.3rem}.modal-rating{font-family:'Playfair Display',serif;color:var(--warm);font-size:1.6rem;font-weight:700;margin-top:.7rem}.modal-rating small{font:300 .7rem 'DM Sans';color:var(--muted)}.modal-meta{font-size:.74rem;color:var(--muted);margin-top:.52rem;line-height:1.6}.modal-body{padding:0 1.25rem 1.3rem}.section{margin-top:1rem}.section-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem}.modal-review{font-family:'Playfair Display',serif;font-style:italic;line-height:1.65;font-size:.92rem;color:#4e4336}.description{font-size:.8rem;line-height:1.6;color:#514638}.reading-list{display:flex;flex-wrap:wrap;gap:.35rem}.reading-chip{font-size:.7rem;border:1px solid var(--border);border-radius:12px;padding:.24rem .5rem;color:var(--muted)}.goodreads-link{display:inline-block;margin-top:1rem;color:var(--warm);text-decoration:none;font-size:.78rem}
footer{text-align:center;margin-top:3rem;padding-top:1.2rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:680px){nav{padding:0 1rem}.nav-links a:not(.active):not(.nav-admin){display:none}.hero{padding:2.2rem 1rem 1.3rem}main{padding:0 .85rem}.grid{grid-template-columns:1fr}.book-card{grid-template-columns:88px minmax(0,1fr);min-height:142px}.cover,.cover-ph{width:88px;min-height:142px}.book-content{padding:.72rem}.modal-top{grid-template-columns:95px minmax(0,1fr);gap:.85rem}.modal-cover,.modal-cover-ph{width:95px;height:143px}.modal h2{font-size:1.18rem}.toolbar{align-items:stretch}.control{flex:1}.search-wrap{max-width:none}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Rahul <span>Subbaraman</span></a>
  <div class="nav-links"><a href="watchlist.html">Watchlist</a><a href="travel.html">Travels</a><a class="active" href="books.html">Bookshelf</a><a href="magnets.html">Magnets</a><a href="postcards.html">Postcards</a><a href="blog.html">Writing</a><a class="nav-admin" href="../Admin/admin.html">Admin</a></div>
</nav>
<header class="hero">
  <div class="eyebrow">Reading archive</div><h1>Rahul's <span>Bookshelf</span></h1><p>Books I have read, rated and reviewed.</p>
  <div class="hero-stats"><span class="hero-stat"><strong id="count">0</strong>books</span><span class="hero-stat"><strong id="average">—</strong>average rating</span><span class="hero-stat"><strong id="updated">—</strong>last updated</span></div>
</header>
<main>
  <div class="toolbar">
    <div class="search-wrap"><span>🔍</span><input id="search" type="search" placeholder="Search title, author, genre or tag…" oninput="render()"></div>
    <select class="control" id="rating-filter" onchange="render()"><option value="">All ratings</option><option value="8">8+</option><option value="6">6+</option><option value="unrated">Unrated</option></select>
    <select class="control" id="year-filter" onchange="render()"><option value="">All read years</option></select>
    <select class="control" id="sort" onchange="render()"><option value="read-desc">Recently read</option><option value="read-asc">Oldest read</option><option value="rating-desc">Highest rated</option><option value="rating-asc">Lowest rated</option><option value="title-asc">Title A–Z</option><option value="author-asc">Author A–Z</option><option value="published-desc">Publication year</option></select>
  </div>
  <div class="genre-pills" id="genre-pills"></div><div class="results" id="results"></div><div class="grid" id="grid"><div class="loading">Opening the shelves…</div></div>
</main>
<div class="overlay" id="overlay" onclick="closeModal(event)"><article class="modal" onclick="event.stopPropagation()"><button class="close" onclick="closeModal()">×</button><div id="modal-content"></div></article></div>
<footer>Ratings are shown out of 10.</footer>
<script>
const DB_URL='https://script.google.com/macros/s/AKfycbwyRBVXxMuiYfxgGXa7tpFF_4e4nYACbAio935382mRYKFwqhYicUcqb0mTfWUxuuT-zw/exec';
const BOOKS_FILE='books.json';
let database={books:[],updatedAt:0};
let activeGenre='All';
function jsonp(url,file){return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');window[cb]=data=>{delete window[cb];s.remove();resolve(data)};s.onerror=()=>{delete window[cb];s.remove();reject(new Error('Drive read failed'))};s.src=url+'?file='+encodeURIComponent(file)+'&callback='+encodeURIComponent(cb)+'&_='+Date.now();document.head.appendChild(s)})}
function esc(v=''){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function jsArg(v){return esc(JSON.stringify(String(v)))}
function normalise(value){const db=Array.isArray(value)?{books:value,updatedAt:0}:value&&Array.isArray(value.books)?value:{books:[],updatedAt:0};db.books=db.books.map(b=>({...b,genres:Array.isArray(b.genres)?b.genres:(b.genre?[b.genre]:[]),tags:Array.isArray(b.tags)?b.tags:[],readings:Array.isArray(b.readings)?b.readings:(b.readDate?[{date:b.readDate,precision:(b.readDate||'').length===7?'month':'day'}]:[]),goodreadsUrl:b.goodreadsUrl||b.link||''}));return db}
function dateTs(v){if(!v)return 0;const d=new Date(v.length===7?v+'-01T00:00:00':v+'T00:00:00');return Number.isNaN(d.getTime())?0:d.getTime()}
function latestReading(b){const known=(b.readings||[]).filter(r=>r.precision!=='unknown'&&dateTs(r.date)).sort((a,b)=>dateTs(b.date)-dateTs(a.date));return known[0]||(b.readings||[]).find(r=>r.precision==='unknown')||null}
function latestReadTs(b){const r=latestReading(b);return r&&r.precision!=='unknown'?dateTs(r.date):0}
function formatReading(r){if(!r||r.precision==='unknown')return'Date unknown';if(r.precision==='month'&&/^\d{4}-\d{2}$/.test(r.date||''))return new Date(r.date+'-01T00:00:00').toLocaleDateString('en-GB',{month:'short',year:'numeric'});if(/^\d{4}-\d{2}-\d{2}$/.test(r.date||''))return new Date(r.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});return r.date||'Date unknown'}
function formatUpdated(ts){if(!ts)return'—';const d=new Date(ts);return Number.isNaN(d.getTime())?'—':d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
async function load(){try{database=normalise(await jsonp(DB_URL,BOOKS_FILE));updateHeader();buildFilters();render()}catch(e){console.error(e);document.getElementById('grid').innerHTML='<div class="empty">Could not load books from Drive.</div>'}}
function updateHeader(){const rated=database.books.filter(b=>b.rating10!==null&&b.rating10!==undefined&&b.rating10!=='');const avg=rated.length?rated.reduce((s,b)=>s+Number(b.rating10||0),0)/rated.length:0;document.getElementById('count').textContent=database.books.length;document.getElementById('average').textContent=avg?avg.toFixed(1)+'/10':'—';document.getElementById('updated').textContent=formatUpdated(database.updatedAt)}
function buildFilters(){const genres=['All',...new Set(database.books.flatMap(b=>b.genres||[]).filter(Boolean).sort((a,b)=>a.localeCompare(b)))];document.getElementById('genre-pills').innerHTML=genres.map(g=>`<button class="pill ${g===activeGenre?'on':''}" onclick="setGenre(${jsArg(g)})">${esc(g)}</button>`).join('');const years=[...new Set(database.books.flatMap(b=>(b.readings||[]).map(r=>(r.date||'').slice(0,4))).filter(Boolean))].sort((a,b)=>b-a);document.getElementById('year-filter').innerHTML='<option value="">All read years</option>'+years.map(y=>`<option>${esc(y)}</option>`).join('')}
function setGenre(g){activeGenre=g;buildFilters();render()}
function visibleBooks(){const q=(document.getElementById('search').value||'').toLowerCase().trim();const minRating=document.getElementById('rating-filter').value;const year=document.getElementById('year-filter').value;const sort=document.getElementById('sort').value;const books=database.books.filter(b=>{const hay=[b.title,b.author,b.review,b.description,(b.genres||[]).join(' '),(b.tags||[]).join(' ')].join(' ').toLowerCase();const genreOk=activeGenre==='All'||(b.genres||[]).includes(activeGenre);const ratingOk=!minRating||(minRating==='unrated'?(b.rating10===null||b.rating10===undefined||b.rating10===''):Number(b.rating10)>=Number(minRating));const yearOk=!year||(b.readings||[]).some(r=>(r.date||'').startsWith(year));return(!q||hay.includes(q))&&genreOk&&ratingOk&&yearOk});books.sort((a,b)=>{if(sort==='read-desc')return latestReadTs(b)-latestReadTs(a)||(b.createdAt||0)-(a.createdAt||0);if(sort==='read-asc'){const at=latestReadTs(a)||Number.MAX_SAFE_INTEGER,bt=latestReadTs(b)||Number.MAX_SAFE_INTEGER;return at-bt}if(sort==='rating-desc')return(Number(b.rating10)||-1)-(Number(a.rating10)||-1);if(sort==='rating-asc'){const ar=a.rating10===null||a.rating10===undefined?99:Number(a.rating10),br=b.rating10===null||b.rating10===undefined?99:Number(b.rating10);return ar-br}if(sort==='title-asc')return(a.title||'').localeCompare(b.title||'');if(sort==='author-asc')return(a.author||'').localeCompare(b.author||'');if(sort==='published-desc')return(Number(b.originalPublicationYear||b.editionYear)||0)-(Number(a.originalPublicationYear||a.editionYear)||0);return 0});return books}
function render(){const books=visibleBooks();document.getElementById('results').textContent=books.length===database.books.length?`${database.books.length} books`:`${books.length} of ${database.books.length} books`;const grid=document.getElementById('grid');if(!books.length){grid.innerHTML='<div class="empty">No books match your filters.</div>';return}grid.innerHTML=books.map((b,i)=>{const r=latestReading(b);const rating=b.rating10!==null&&b.rating10!==undefined&&b.rating10!==''?Number(b.rating10):null;return`<article class="book-card" style="animation-delay:${Math.min(i*.02,.35)}s" onclick="openModal('${esc(b.id)}')">${b.cover?`<img class="cover" src="${esc(b.cover)}" alt="${esc(b.title)}" loading="lazy" onerror="this.outerHTML='<div class=cover-ph>📖</div>'">`:'<div class="cover-ph">📖</div>'}<div class="book-content"><div class="chips">${(b.genres||[]).slice(0,3).map(g=>`<span class="genre">${esc(g)}</span>`).join('')}${(b.tags||[]).slice(0,1).map(t=>`<span class="genre tag">${esc(t)}</span>`).join('')}</div><div class="title">${esc(b.title)}</div><div class="author">${esc(b.author||'Unknown author')}</div>${rating!==null?`<div class="rating-line"><div class="rating">${rating.toFixed(rating%1?1:0)}<small>/10</small></div><div class="rating-bar"><div class="rating-fill" style="width:${Math.max(0,Math.min(100,rating*10))}%"></div></div></div>`:''}${b.review?`<div class="review">“${esc(b.review)}”</div>`:''}<div class="details">${r?'Read '+esc(formatReading(r)):''}${(b.readings||[]).length>1?` · Read ${b.readings.length} times`:''}${b.originalPublicationYear?` · First published ${esc(b.originalPublicationYear)}`:''}</div></div></article>`}).join('')}
function openModal(id){const b=database.books.find(x=>x.id===id);if(!b)return;const rating=b.rating10!==null&&b.rating10!==undefined&&b.rating10!==''?Number(b.rating10):null;const metadata=[b.originalPublicationYear?`First published ${b.originalPublicationYear}`:'',b.editionYear?`Edition ${b.editionYear}`:'',b.publisher||'',b.pages?`${b.pages} pages`:'',b.language||'',b.isbn13?`ISBN-13 ${b.isbn13}`:(b.isbn?`ISBN ${b.isbn}`:'')].filter(Boolean);document.getElementById('modal-content').innerHTML=`<div class="modal-top">${b.cover?`<img class="modal-cover" src="${esc(b.cover)}" alt="${esc(b.title)}">`:'<div class="modal-cover-ph">📖</div>'}<div><div class="chips">${(b.genres||[]).map(g=>`<span class="genre">${esc(g)}</span>`).join('')}</div><h2>${esc(b.title)}</h2><div class="modal-author">${esc(b.author||'Unknown author')}${(b.additionalAuthors||[]).length?' with '+esc(b.additionalAuthors.join(', ')):''}</div>${rating!==null?`<div class="modal-rating">${rating.toFixed(rating%1?1:0)}<small>/10</small></div>`:''}<div class="modal-meta">${metadata.map(esc).join('<br>')}</div></div></div><div class="modal-body">${(b.readings||[]).length?`<div class="section"><div class="section-label">Reading history</div><div class="reading-list">${b.readings.slice().sort((a,b)=>dateTs(b.date)-dateTs(a.date)).map(r=>`<span class="reading-chip">${esc(formatReading(r))}</span>`).join('')}</div></div>`:''}${(b.tags||[]).length?`<div class="section"><div class="section-label">Tags</div><div class="chips">${b.tags.map(t=>`<span class="genre tag">${esc(t)}</span>`).join('')}</div></div>`:''}${b.review?`<div class="section"><div class="section-label">My review</div><div class="modal-review">“${esc(b.review)}”</div></div>`:''}${b.description?`<div class="section"><div class="section-label">Description</div><div class="description">${esc(b.description)}</div></div>`:''}${b.goodreadsUrl?`<a class="goodreads-link" href="${esc(b.goodreadsUrl)}" target="_blank" rel="noopener">View on Goodreads →</a>`:''}</div>`;document.getElementById('overlay').classList.add('on')}
function closeModal(e){if(e&&e.target!==document.getElementById('overlay'))return;document.getElementById('overlay').classList.remove('on')}
load();
</script>
</body>
</html>
