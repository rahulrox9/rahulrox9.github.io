<!DOCTYPE html>
<html>
<head><title>Admin</title></head>
<body>

<h2>Admin Login</h2>
<input id="pw" type="password" placeholder="Password">
<button onclick="unlock()">Unlock</button>

<div id="dash" style="display:none; margin-top:20px;">
  <h3>Dashboard</h3>
  <a href="editor-final.html" target="_blank">Open Lesson Editor</a><br><br>
  <button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN_HASH = "2e3aecbefb8c5dffa223b24e7a1e6f301344abbed22ec7e3a53c770a7e47e8a0";

async function sha256Hex(text) {
  const data = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return [...new Uint8Array(hashBuffer)].map(b => b.toString(16).padStart(2,"0")).join("");
}

async function unlock(){
  const val = document.getElementById("pw").value;
  const hash = await sha256Hex(val);
  if(hash === ADMIN_HASH){
    localStorage.setItem("auth", hash);
    document.getElementById("dash").style.display="block";
  } else {
    alert("Wrong password");
  }
}

function logout(){
  localStorage.removeItem("auth");
  document.getElementById("dash").style.display="none";
}

if(localStorage.getItem("auth") === ADMIN_HASH){
  document.getElementById("dash").style.display="block";
}
</script>

</body>
</html>
