<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul's Postcard Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--surface:#1a1814;--card:#222018;--border:#2e2b26;
  --amber:#e8a83e;--amber-dim:#7a5820;--cream:#f5efe4;--muted:#6b6459;--red:#c0392b;
}
html,body{height:100%;font-family:'DM Mono',monospace;background:var(--bg);color:var(--cream);overflow:hidden}
.shell{display:grid;grid-template-columns:340px 1fr;height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:1.4rem;border-bottom:1px solid var(--border)}
.logo{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--amber)}
.drop-zone{margin:1rem;border:1.5px dashed var(--border);padding:1.5rem;text-align:center;cursor:pointer;position:relative;transition:background 0.2s}
.drop-zone.active{background:rgba(232,168,62,0.05);border-color:var(--amber)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
#upload-status{font-size:0.7rem;color:var(--amber);margin-top:0.5rem;display:none;font-weight:500}
.settings{padding:1.2rem;flex:1;overflow-y:auto}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;font-size:0.75rem}
.row input[type=range]{width:100px;accent-color:var(--amber)}
.main-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.grid-wrap{flex:1;overflow-y:auto;padding:1.2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;position:relative}
.card img{width:100%;height:140px;object-fit:cover;cursor:pointer}
.card-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.6);color:var(--red);border:none;width:24px;height:24px;border-radius:2px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;z-index:10}
.card-foot{padding:0.5rem;display:flex;justify-content:space-between;font-size:0.65rem}
.modal-bg{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column}
.modal-bg.open{display:flex}
.crop-container{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#111;overflow:hidden}
#crop-canvas{cursor:crosshair;max-width:95vw;max-height:80vh}
#loupe-container{position:absolute;top:20px;left:20px;width:200px;height:200px;border:2px solid var(--amber);background:#000;display:none;z-index:2000;pointer-events:none}
#loupe-canvas{width:100%;height:100%}
.hud-bottom{padding:1rem;background:var(--surface);display:flex;gap:1rem;align-items:center;justify-content:center;flex-wrap:wrap}
.hud-coords{display:flex;gap:0.8rem;font-size:0.6rem;color:var(--muted);width:100%;justify-content:center;margin-bottom:0.5rem}
.hud-coords span{color:var(--amber)}
.btn{padding:0.5rem 1rem;background:var(--border);color:var(--cream);border:none;cursor:pointer;font-family:inherit;font-size:0.75rem;border-radius:2px}
.btn.primary{background:var(--amber);color:#000;font-weight:600}
.btn.danger{background:transparent;border:1px solid var(--red);color:var(--red)}
#progress-wrap{padding:1rem;display:none}
.p-bar{height:4px;background:var(--border);width:100%}
#p-fill{height:100%;background:var(--amber);width:0%}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="sidebar-head"><div class="logo">Postcard Scanner</div></div>
    <div class="drop-zone" id="drop-area">
      <input type="file" id="file-input" accept=".pdf" multiple>
      <strong>Drop PDF</strong><br><span style="font-size:0.7rem;opacity:0.5">Multi-page support</span>
      <div id="upload-status"></div>
    </div>
    <div class="settings">
        <div class="row"><label>DPI</label><input type="range" id="dpi" min="1" max="4" step="1" value="2"></div>
        <div class="row"><label>Quality</label><input type="range" id="quality" min="60" max="100" value="90"></div>
    </div>
    <div id="progress-wrap"><div class="p-bar"><div id="p-fill"></div></div><div id="p-txt" style="font-size:0.6rem;margin-top:4px"></div></div>
    <div style="padding:1rem"><button class="btn primary" id="proc-btn" style="width:100%" disabled onclick="processPDF()">Process PDF</button></div>
  </div>
  <div class="main">
    <div class="main-head">
        <div style="font-size:0.8rem">Processed: <span id="count">0</span></div>
        <div style="display:flex;gap:0.5rem">
            <button class="btn" onclick="downloadAll()">Download All</button>
            <button class="btn danger" onclick="clearAll()">Clear All</button>
        </div>
    </div>
    <div class="grid-wrap"><div class="grid" id="card-grid"></div></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="crop-container">
    <div id="loupe-container"><canvas id="loupe-canvas"></canvas></div>
    <canvas id="crop-canvas"></canvas>
  </div>
  <div class="hud-bottom">
    <div class="hud-coords" id="hud-coords"></div>
    <div class="row" style="margin-right:1rem">
        <label style="font-size:0.7rem;margin-right:0.5rem">Rotation</label>
        <input type="range" id="rotate-range" min="-180" max="180" step="1" value="0" oninput="updateRotate(this.value)">
        <span id="rotate-val" style="font-size:0.7rem;margin-left:0.4rem;min-width:30px">0°</span>
    </div>
    <button class="btn" onclick="quickRotate(90)">↻ 90°</button>
    <button class="btn" onclick="autoDetectCorners()">Re-detect</button>
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="applyCrop()">Apply Crop</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pages = [];
let modalPageId = null;
let corners = [];
let rotation = 0;
let draggingCorner = null;
let draggingEdge = null;
let dragStart = null;
let dragEdgeStartCorners = null;
let modalScale = 1;
let rawCanvas = null;

const fileInput = document.getElementById('file-input');
const dropArea = document.getElementById('drop-area');
const statusText = document.getElementById('upload-status');
const procBtn = document.getElementById('proc-btn');
const cropCanvas = document.getElementById('crop-canvas');
const ctx = cropCanvas.getContext('2d');
const lc = document.getElementById('loupe-canvas');
const lctx = lc.getContext('2d');

fileInput.onchange = (e) => {
    if (e.target.files.length) {
        const count = e.target.files.length;
        statusText.innerText = `${count} PDF${count > 1 ? 's' : ''} staged`;
        statusText.style.display = 'block';
        dropArea.classList.add('active');
        procBtn.disabled = false;
        procBtn._files = [...e.target.files];
    }
};

dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('active');
});

dropArea.addEventListener('dragleave', () => {
    if (!procBtn._files?.length) dropArea.classList.remove('active');
});

dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (!files.length) return;
    fileInput.files = e.dataTransfer.files;
    procBtn._files = files;
    statusText.innerText = `${files.length} PDF${files.length > 1 ? 's' : ''} staged`;
    statusText.style.display = 'block';
    dropArea.classList.add('active');
    procBtn.disabled = false;
});

function getQuality() {
    return parseInt(document.getElementById('quality').value, 10) / 100;
}

function updateProgress(done, total, label = '') {
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('p-fill').style.width = pct + '%';
    document.getElementById('p-txt').innerText = `${pct}% ${label}`.trim();
}

async function processPDF() {
    const files = procBtn._files || [];
    if (!files.length) return;

    const scale = parseFloat(document.getElementById('dpi').value);
    document.getElementById('progress-wrap').style.display = 'block';

    let totalPages = 0;
    const pdfs = [];
    for (const file of files) {
        const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
        pdfs.push({ file, pdf });
        totalPages += pdf.numPages;
    }

    let done = 0;
    for (const { file, pdf } of pdfs) {
        for (let i = 1; i <= pdf.numPages; i++) {
            updateProgress(done, totalPages, `Processing ${file.name} • page ${i}/${pdf.numPages}`);
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale });
            const canv = document.createElement('canvas');
            canv.width = Math.round(vp.width);
            canv.height = Math.round(vp.height);
            await page.render({ canvasContext: canv.getContext('2d'), viewport: vp }).promise;

            const detected = detectPostcard(canv);
            const thumb = renderOutput(canv, detected, 0, getQuality());

            const id = 'pg-' + Math.random().toString(36).slice(2, 11);
            const obj = {
                id,
                raw: canv,
                corners: detected,
                thumb,
                rotation: 0
            };
            pages.push(obj);
            addCard(obj);
            updateCount();
            done++;
            updateProgress(done, totalPages, `Processed ${file.name}`);
        }
    }

    updateProgress(totalPages, totalPages, 'Done');
    setTimeout(() => {
        document.getElementById('progress-wrap').style.display = 'none';
    }, 500);
}

function sampleBackgroundColor(img, w, h) {
    const samples = [];
    const read = (x, y) => {
        const i = (y * w + x) * 4;
        return [img[i], img[i + 1], img[i + 2]];
    };

    const margin = Math.max(4, Math.floor(Math.min(w, h) * 0.03));

    for (let x = 0; x < w; x += Math.max(1, Math.floor(w / 40))) {
        samples.push(read(x, margin));
        samples.push(read(x, h - 1 - margin));
    }
    for (let y = 0; y < h; y += Math.max(1, Math.floor(h / 40))) {
        samples.push(read(margin, y));
        samples.push(read(w - 1 - margin, y));
    }

    const avg = samples.reduce((a, s) => {
        a[0] += s[0]; a[1] += s[1]; a[2] += s[2];
        return a;
    }, [0, 0, 0]);

    return avg.map(v => v / samples.length);
}

function detectPostcard(canv) {
    const analysisMax = 900;
    const scale = Math.min(1, analysisMax / Math.max(canv.width, canv.height));
    const aw = Math.max(64, Math.round(canv.width * scale));
    const ah = Math.max(64, Math.round(canv.height * scale));

    const tmp = document.createElement('canvas');
    tmp.width = aw;
    tmp.height = ah;
    const tctx = tmp.getContext('2d', { willReadFrequently: true });
    tctx.drawImage(canv, 0, 0, aw, ah);

    const image = tctx.getImageData(0, 0, aw, ah);
    const data = image.data;
    const bg = sampleBackgroundColor(data, aw, ah);

    const mask = new Uint8Array(aw * ah);
    const diffThreshold = 42;

    for (let y = 0; y < ah; y++) {
        for (let x = 0; x < aw; x++) {
            const i = (y * aw + x) * 4;
            const dr = data[i] - bg[0];
            const dg = data[i + 1] - bg[1];
            const db = data[i + 2] - bg[2];
            const dist = Math.sqrt(dr * dr + dg * dg + db * db);
            if (dist > diffThreshold) mask[y * aw + x] = 1;
        }
    }

    // Simple morphology: close gaps
    const dilated = new Uint8Array(mask.length);
    for (let y = 1; y < ah - 1; y++) {
        for (let x = 1; x < aw - 1; x++) {
            let hit = 0;
            for (let yy = -1; yy <= 1 && !hit; yy++) {
                for (let xx = -1; xx <= 1; xx++) {
                    if (mask[(y + yy) * aw + (x + xx)]) { hit = 1; break; }
                }
            }
            dilated[y * aw + x] = hit;
        }
    }

    const eroded = new Uint8Array(mask.length);
    for (let y = 1; y < ah - 1; y++) {
        for (let x = 1; x < aw - 1; x++) {
            let keep = 1;
            for (let yy = -1; yy <= 1 && keep; yy++) {
                for (let xx = -1; xx <= 1; xx++) {
                    if (!dilated[(y + yy) * aw + (x + xx)]) { keep = 0; break; }
                }
            }
            eroded[y * aw + x] = keep;
        }
    }

    // Largest connected component
    const visited = new Uint8Array(mask.length);
    let best = null;

    const qx = new Int32Array(mask.length);
    const qy = new Int32Array(mask.length);

    for (let sy = 0; sy < ah; sy++) {
        for (let sx = 0; sx < aw; sx++) {
            const idx = sy * aw + sx;
            if (!eroded[idx] || visited[idx]) continue;

            let head = 0, tail = 0;
            qx[tail] = sx; qy[tail] = sy; tail++;
            visited[idx] = 1;

            let minX = sx, minY = sy, maxX = sx, maxY = sy, area = 0;

            while (head < tail) {
                const x = qx[head];
                const y = qy[head];
                head++;
                area++;

                if (x < minX) minX = x;
                if (y < minY) minY = y;
                if (x > maxX) maxX = x;
                if (y > maxY) maxY = y;

                const neighbors = [
                    [x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]
                ];

                for (const [nx, ny] of neighbors) {
                    if (nx < 0 || ny < 0 || nx >= aw || ny >= ah) continue;
                    const ni = ny * aw + nx;
                    if (eroded[ni] && !visited[ni]) {
                        visited[ni] = 1;
                        qx[tail] = nx; qy[tail] = ny; tail++;
                    }
                }
            }

            const bw = maxX - minX + 1;
            const bh = maxY - minY + 1;
            const rectArea = bw * bh;
            const fill = area / Math.max(1, rectArea);

            if (
                bw > aw * 0.08 &&
                bh > ah * 0.08 &&
                fill > 0.45 &&
                (!best || area > best.area)
            ) {
                best = { minX, minY, maxX, maxY, area };
            }
        }
    }

    if (!best) {
        const pad = 50;
        return [
            { x: pad, y: pad },
            { x: canv.width - pad, y: pad },
            { x: canv.width - pad, y: canv.height - pad },
            { x: pad, y: canv.height - pad }
        ];
    }

    const pad = 4;
    let x1 = Math.max(0, best.minX - pad);
    let y1 = Math.max(0, best.minY - pad);
    let x2 = Math.min(aw - 1, best.maxX + pad);
    let y2 = Math.min(ah - 1, best.maxY + pad);

    // Refine edges by scanning for dense mask rows/cols
    const colCount = new Uint32Array(aw);
    const rowCount = new Uint32Array(ah);
    for (let y = y1; y <= y2; y++) {
        for (let x = x1; x <= x2; x++) {
            if (eroded[y * aw + x]) {
                colCount[x]++;
                rowCount[y]++;
            }
        }
    }

    const colThresh = Math.max(3, Math.round((y2 - y1 + 1) * 0.15));
    const rowThresh = Math.max(3, Math.round((x2 - x1 + 1) * 0.15));

    while (x1 < x2 && colCount[x1] < colThresh) x1++;
    while (x2 > x1 && colCount[x2] < colThresh) x2--;
    while (y1 < y2 && rowCount[y1] < rowThresh) y1++;
    while (y2 > y1 && rowCount[y2] < rowThresh) y2--;

    const sx = canv.width / aw;
    const sy = canv.height / ah;

    return normalizeCorners([
        { x: x1 * sx, y: y1 * sy },
        { x: x2 * sx, y: y1 * sy },
        { x: x2 * sx, y: y2 * sy },
        { x: x1 * sx, y: y2 * sy }
    ]);
}

function normalizeCorners(pts) {
    const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
    const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;

    const sorted = [...pts].sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));

    let start = 0;
    let best = Infinity;
    for (let i = 0; i < sorted.length; i++) {
        const score = sorted[i].x + sorted[i].y;
        if (score < best) {
            best = score;
            start = i;
        }
    }

    const out = [
        sorted[start],
        sorted[(start + 1) % 4],
        sorted[(start + 2) % 4],
        sorted[(start + 3) % 4]
    ];

    // Ensure clockwise order is [tl, tr, br, bl]
    if (cross(out[0], out[1], out[2]) < 0) {
        return [out[0], out[3], out[2], out[1]];
    }
    return out;
}

function cross(a, b, c) {
    return (b.x - a.x) * (c.y - a.y) - (b.y - a.y) * (c.x - a.x);
}

function dist(a, b) {
    return Math.hypot(b.x - a.x, b.y - a.y);
}

function clampPoint(p) {
    p.x = Math.max(0, Math.min(rawCanvas.width - 1, p.x));
    p.y = Math.max(0, Math.min(rawCanvas.height - 1, p.y));
}

function pointToSegmentDistance(p, a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);

    let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * dx;
    const py = a.y + t * dy;
    return Math.hypot(p.x - px, p.y - py);
}

function addCard(pg) {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = pg.id;
    div.innerHTML = `
        <button class="card-del" onclick="removePage('${pg.id}')">✕</button>
        <img src="${pg.thumb}" onclick="openModal('${pg.id}')">
        <div class="card-foot"><span>Postcard</span><span>Edit</span></div>
    `;
    document.getElementById('card-grid').appendChild(div);
}

function removePage(id) {
    pages = pages.filter(p => p.id !== id);
    document.getElementById(id)?.remove();
    updateCount();
}

function clearAll() {
    if (!confirm('Clear all?')) return;
    pages = [];
    document.getElementById('card-grid').innerHTML = '';
    updateCount();
    procBtn.disabled = true;
    procBtn._files = [];
    statusText.style.display = 'none';
    dropArea.classList.remove('active');
}

function updateCount() {
    document.getElementById('count').innerText = pages.length;
}

function openModal(id) {
    const pg = pages.find(p => p.id === id);
    if (!pg) return;
    modalPageId = id;
    rawCanvas = pg.raw;
    corners = normalizeCorners(pg.corners.map(c => ({ ...c })));
    rotation = pg.rotation || 0;
    document.getElementById('rotate-range').value = rotation;
    document.getElementById('rotate-val').innerText = rotation + '°';
    document.getElementById('modal-bg').classList.add('open');
    draw();
}

function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('loupe-container').style.display = 'none';
    draggingCorner = null;
    draggingEdge = null;
}

function updateRotate(val) {
    rotation = parseInt(val, 10);
    document.getElementById('rotate-val').innerText = val + '°';
    draw();
}

function quickRotate(deg) {
    rotation = ((rotation + deg) % 360 + 360) % 360;
    document.getElementById('rotate-range').value = rotation;
    document.getElementById('rotate-val').innerText = rotation + '°';
    draw();
}

function draw() {
    const s = Math.min((window.innerWidth * 0.9) / rawCanvas.width, (window.innerHeight * 0.72) / rawCanvas.height, 1);
    modalScale = s;

    cropCanvas.width = rawCanvas.width;
    cropCanvas.height = rawCanvas.height;
    cropCanvas.style.width = (rawCanvas.width * s) + 'px';
    cropCanvas.style.height = (rawCanvas.height * s) + 'px';

    ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
    ctx.drawImage(rawCanvas, 0, 0);

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.rect(0, 0, cropCanvas.width, cropCanvas.height);
    ctx.moveTo(corners[0].x, corners[0].y);
    ctx.lineTo(corners[1].x, corners[1].y);
    ctx.lineTo(corners[2].x, corners[2].y);
    ctx.lineTo(corners[3].x, corners[3].y);
    ctx.closePath();
    ctx.fill('evenodd');

    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = Math.max(1.25, 2 / s);
    ctx.setLineDash([Math.max(4, 8 / s), Math.max(4, 8 / s)]);
    ctx.beginPath();
    ctx.moveTo(corners[0].x, corners[0].y);
    for (let i = 1; i < 4; i++) ctx.lineTo(corners[i].x, corners[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = '#e8a83e';
    ctx.fillStyle = '#e8a83e';
    ctx.lineWidth = Math.max(1.5, 2.2 / s);

    // Edge handles
    for (let i = 0; i < 4; i++) {
        const a = corners[i];
        const b = corners[(i + 1) % 4];
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const vx = b.x - a.x;
        const vy = b.y - a.y;
        const len = Math.hypot(vx, vy) || 1;
        const nx = -vy / len;
        const ny = vx / len;
        const half = Math.max(8, 10 / s);

        ctx.beginPath();
        ctx.moveTo(mx - nx * half, my - ny * half);
        ctx.lineTo(mx + nx * half, my + ny * half);
        ctx.stroke();
    }

    // Corner handles
    for (const p of corners) {
        const r = Math.max(5, 7 / s);
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#111';
        ctx.lineWidth = Math.max(1, 1.5 / s);
        ctx.stroke();
        ctx.strokeStyle = '#e8a83e';
    }

    document.getElementById('hud-coords').innerHTML = corners
        .map((c, i) => `P${i}: <span>${Math.round(c.x)},${Math.round(c.y)}</span>`)
        .join('&nbsp;&nbsp;&nbsp;');
}

function getMouse(e) {
    const r = cropCanvas.getBoundingClientRect();
    return {
        x: (e.clientX - r.left) / modalScale,
        y: (e.clientY - r.top) / modalScale
    };
}

cropCanvas.onmousedown = (e) => {
    const m = getMouse(e);
    const cornerHit = 12 / modalScale;
    const edgeHit = 10 / modalScale;

    draggingCorner = corners.findIndex(p => Math.hypot(p.x - m.x, p.y - m.y) < cornerHit);
    draggingEdge = null;
    dragStart = m;
    dragEdgeStartCorners = corners.map(c => ({ ...c }));

    if (draggingCorner !== -1) return;

    const edges = [
        { name: 'top', a: corners[0], b: corners[1], idx: [0, 1] },
        { name: 'right', a: corners[1], b: corners[2], idx: [1, 2] },
        { name: 'bottom', a: corners[2], b: corners[3], idx: [2, 3] },
        { name: 'left', a: corners[3], b: corners[0], idx: [3, 0] }
    ];

    for (const edge of edges) {
        if (pointToSegmentDistance(m, edge.a, edge.b) < edgeHit) {
            draggingEdge = edge;
            return;
        }
    }
};

window.onmousemove = (e) => {
    if (draggingCorner === null && !draggingEdge) return;

    const m = getMouse(e);

    if (draggingCorner !== null) {
        corners[draggingCorner].x = m.x;
        corners[draggingCorner].y = m.y;
        clampPoint(corners[draggingCorner]);
    } else if (draggingEdge) {
        const dx = m.x - dragStart.x;
        const dy = m.y - dragStart.y;
        const [i1, i2] = draggingEdge.idx;

        corners = dragEdgeStartCorners.map(c => ({ ...c }));
        corners[i1].x += dx;
        corners[i1].y += dy;
        corners[i2].x += dx;
        corners[i2].y += dy;
        clampPoint(corners[i1]);
        clampPoint(corners[i2]);
    }

    corners = normalizeCorners(corners);

    const focus = draggingCorner !== null ? corners[draggingCorner] || m : m;
    document.getElementById('loupe-container').style.display = 'block';
    lc.width = 200;
    lc.height = 200;
    const sx = Math.max(0, Math.min(rawCanvas.width - 100, focus.x - 50));
    const sy = Math.max(0, Math.min(rawCanvas.height - 100, focus.y - 50));
    lctx.clearRect(0, 0, 200, 200);
    lctx.drawImage(rawCanvas, sx, sy, 100, 100, 0, 0, 200, 200);
    lctx.strokeStyle = '#e8a83e';
    lctx.lineWidth = 2;
    lctx.strokeRect(95, 95, 10, 10);

    draw();
};

window.onmouseup = () => {
    draggingCorner = null;
    draggingEdge = null;
    document.getElementById('loupe-container').style.display = 'none';
};

window.onresize = () => {
    if (document.getElementById('modal-bg').classList.contains('open')) draw();
};

function autoDetectCorners() {
    corners = detectPostcard(rawCanvas);
    draw();
}

function applyCrop() {
    const pg = pages.find(p => p.id === modalPageId);
    if (!pg) return;
    pg.corners = normalizeCorners(corners.map(c => ({ ...c })));
    pg.rotation = rotation;
    pg.thumb = renderOutput(rawCanvas, pg.corners, rotation, getQuality());
    document.getElementById(pg.id).querySelector('img').src = pg.thumb;
    closeModal();
}

function downloadAll() {
    pages.forEach((p, i) => {
        const a = document.createElement('a');
        a.href = p.thumb;
        a.download = `postcard-${i + 1}.jpg`;
        a.click();
    });
}

/* ---------- Perspective crop ---------- */

function solveLinearSystem(A, b) {
    const n = b.length;
    for (let i = 0; i < n; i++) {
        let maxRow = i;
        for (let r = i + 1; r < n; r++) {
            if (Math.abs(A[r][i]) > Math.abs(A[maxRow][i])) maxRow = r;
        }
        [A[i], A[maxRow]] = [A[maxRow], A[i]];
        [b[i], b[maxRow]] = [b[maxRow], b[i]];

        const pivot = A[i][i] || 1e-12;
        for (let c = i; c < n; c++) A[i][c] /= pivot;
        b[i] /= pivot;

        for (let r = 0; r < n; r++) {
            if (r === i) continue;
            const factor = A[r][i];
            for (let c = i; c < n; c++) A[r][c] -= factor * A[i][c];
            b[r] -= factor * b[i];
        }
    }
    return b;
}

function computeHomography(srcPts, dstPts) {
    const A = [];
    const b = [];

    for (let i = 0; i < 4; i++) {
        const x = srcPts[i].x;
        const y = srcPts[i].y;
        const u = dstPts[i].x;
        const v = dstPts[i].y;

        A.push([x, y, 1, 0, 0, 0, -u * x, -u * y]);
        b.push(u);

        A.push([0, 0, 0, x, y, 1, -v * x, -v * y]);
        b.push(v);
    }

    const h = solveLinearSystem(A, b);
    return [
        [h[0], h[1], h[2]],
        [h[3], h[4], h[5]],
        [h[6], h[7], 1]
    ];
}

function applyHomography(H, x, y) {
    const d = H[2][0] * x + H[2][1] * y + H[2][2];
    return {
        x: (H[0][0] * x + H[0][1] * y + H[0][2]) / d,
        y: (H[1][0] * x + H[1][1] * y + H[1][2]) / d
    };
}

function bilinearSample(data, w, h, x, y) {
    x = Math.max(0, Math.min(w - 1, x));
    y = Math.max(0, Math.min(h - 1, y));

    const x0 = Math.floor(x);
    const y0 = Math.floor(y);
    const x1 = Math.min(w - 1, x0 + 1);
    const y1 = Math.min(h - 1, y0 + 1);

    const dx = x - x0;
    const dy = y - y0;

    const i00 = (y0 * w + x0) * 4;
    const i10 = (y0 * w + x1) * 4;
    const i01 = (y1 * w + x0) * 4;
    const i11 = (y1 * w + x1) * 4;

    const out = [0, 0, 0, 0];
    for (let c = 0; c < 4; c++) {
        const v =
            data[i00 + c] * (1 - dx) * (1 - dy) +
            data[i10 + c] * dx * (1 - dy) +
            data[i01 + c] * (1 - dx) * dy +
            data[i11 + c] * dx * dy;
        out[c] = v;
    }
    return out;
}

function warpPerspective(srcCanvas, quad, outW, outH) {
    const srcCtx = srcCanvas.getContext('2d', { willReadFrequently: true });
    const srcImg = srcCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
    const srcData = srcImg.data;

    const out = document.createElement('canvas');
    out.width = Math.max(1, Math.round(outW));
    out.height = Math.max(1, Math.round(outH));
    const octx = out.getContext('2d', { willReadFrequently: true });
    const outImg = octx.createImageData(out.width, out.height);
    const outData = outImg.data;

    const dstRect = [
        { x: 0, y: 0 },
        { x: out.width - 1, y: 0 },
        { x: out.width - 1, y: out.height - 1 },
        { x: 0, y: out.height - 1 }
    ];

    const H = computeHomography(dstRect, quad);

    for (let y = 0; y < out.height; y++) {
        for (let x = 0; x < out.width; x++) {
            const src = applyHomography(H, x, y);
            const rgba = bilinearSample(srcData, srcCanvas.width, srcCanvas.height, src.x, src.y);
            const i = (y * out.width + x) * 4;
            outData[i] = rgba[0];
            outData[i + 1] = rgba[1];
            outData[i + 2] = rgba[2];
            outData[i + 3] = rgba[3];
        }
    }

    octx.putImageData(outImg, 0, 0);
    return out;
}

function rotateCanvas(src, deg) {
    const r = ((deg % 360) + 360) % 360;
    if (r === 0) return src;

    const rad = r * Math.PI / 180;
    const s = Math.abs(Math.sin(rad));
    const c = Math.abs(Math.cos(rad));

    const out = document.createElement('canvas');
    out.width = Math.round(src.width * c + src.height * s);
    out.height = Math.round(src.width * s + src.height * c);

    const octx = out.getContext('2d');
    octx.translate(out.width / 2, out.height / 2);
    octx.rotate(rad);
    octx.drawImage(src, -src.width / 2, -src.height / 2);
    return out;
}

function renderOutput(src, c, rot, quality) {
    c = normalizeCorners(c);

    const top = dist(c[0], c[1]);
    const right = dist(c[1], c[2]);
    const bottom = dist(c[2], c[3]);
    const left = dist(c[3], c[0]);

    const outW = Math.max(top, bottom);
    const outH = Math.max(left, right);

    let warped = warpPerspective(src, c, outW, outH);
    warped = rotateCanvas(warped, rot);

    return warped.toDataURL('image/jpeg', quality);
}
