<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postcard Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--surface:#1a1814;--card:#222018;--border:#2e2b26;
  --amber:#e8a83e;--amber-dim:#7a5820;--cream:#f5efe4;--muted:#6b6459;--red:#c0392b;
}
html,body{height:100%;font-family:'DM Mono',monospace;background:var(--bg);color:var(--cream);overflow:hidden}
.shell{display:grid;grid-template-columns:340px 1fr;height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:1.4rem;border-bottom:1px solid var(--border)}
.logo{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--amber)}
.drop-zone{margin:1rem;border:1.5px dashed var(--border);padding:1.5rem;text-align:center;cursor:pointer;position:relative;transition:background 0.2s}
.drop-zone.active{background:rgba(232,168,62,0.05);border-color:var(--amber)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
#upload-status{font-size:0.7rem;color:var(--amber);margin-top:0.5rem;display:none;font-weight:500}
.settings{padding:1.2rem;flex:1;overflow-y:auto}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;font-size:0.75rem}
.row input[type=range]{width:100px;accent-color:var(--amber)}
.main-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.grid-wrap{flex:1;overflow-y:auto;padding:1.2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;position:relative}
.card img{width:100%;height:140px;object-fit:cover;cursor:pointer}
.card-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.6);color:var(--red);border:none;width:24px;height:24px;border-radius:2px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;z-index:10}
.card-foot{padding:0.5rem;display:flex;justify-content:space-between;font-size:0.65rem}
.modal-bg{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column}
.modal-bg.open{display:flex}
.crop-container{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#111;overflow:hidden}
#crop-canvas{cursor:crosshair;max-width:95vw;max-height:80vh}
#loupe-container{position:absolute;top:20px;left:20px;width:200px;height:200px;border:2px solid var(--amber);background:#000;display:none;z-index:2000;pointer-events:none}
#loupe-canvas{width:100%;height:100%}
.hud-bottom{padding:1rem;background:var(--surface);display:flex;gap:1rem;align-items:center;justify-content:center;flex-wrap:wrap}
.hud-coords{display:flex;gap:0.8rem;font-size:0.6rem;color:var(--muted);width:100%;justify-content:center;margin-bottom:0.5rem}
.hud-coords span{color:var(--amber)}
.btn{padding:0.5rem 1rem;background:var(--border);color:var(--cream);border:none;cursor:pointer;font-family:inherit;font-size:0.75rem;border-radius:2px}
.btn.primary{background:var(--amber);color:#000;font-weight:600}
.btn.danger{background:transparent;border:1px solid var(--red);color:var(--red)}
#progress-wrap{padding:1rem;display:none}
.p-bar{height:4px;background:var(--border);width:100%}
#p-fill{height:100%;background:var(--amber);width:0%}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="sidebar-head"><div class="logo">Postcard Scanner</div></div>
    <div class="drop-zone" id="drop-area">
      <input type="file" id="file-input" accept=".pdf" multiple>
      <strong>Drop PDF</strong><br><span style="font-size:0.7rem;opacity:0.5">Multi-page support</span>
      <div id="upload-status"></div>
    </div>
    <div class="settings">
        <div class="row"><label>DPI</label><input type="range" id="dpi" min="1" max="4" step="1" value="2"></div>
        <div class="row"><label>Quality</label><input type="range" id="quality" min="60" max="100" value="90"></div>
    </div>
    <div id="progress-wrap"><div class="p-bar"><div id="p-fill"></div></div><div id="p-txt" style="font-size:0.6rem;margin-top:4px"></div></div>
    <div style="padding:1rem"><button class="btn primary" id="proc-btn" style="width:100%" disabled onclick="processPDF()">Process PDF</button></div>
  </div>
  <div class="main">
    <div class="main-head">
        <div style="font-size:0.8rem">Processed: <span id="count">0</span></div>
        <div style="display:flex;gap:0.5rem">
            <button class="btn" onclick="downloadAll()">Download All</button>
            <button class="btn danger" onclick="clearAll()">Clear All</button>
        </div>
    </div>
    <div class="grid-wrap"><div class="grid" id="card-grid"></div></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="crop-container">
    <div id="loupe-container"><canvas id="loupe-canvas"></canvas></div>
    <canvas id="crop-canvas"></canvas>
  </div>
  <div class="hud-bottom">
    <div class="hud-coords" id="hud-coords"></div>
    <div class="row" style="margin-right:1rem">
        <label style="font-size:0.7rem;margin-right:0.5rem">Rotation</label>
        <input type="range" id="rotate-range" min="-180" max="180" step="1" value="0" oninput="updateRotate(this.value)">
        <span id="rotate-val" style="font-size:0.7rem;margin-left:0.4rem;min-width:30px">0°</span>
    </div>
    <button class="btn" onclick="quickRotate(90)">↻ 90°</button>
    <button class="btn" onclick="autoDetectCorners()">Re-detect</button>
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="applyCrop()">Apply Crop</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pages = [];
let modalPageId = null;
let corners = []; 
let rotation = 0;
let dragging = null; 
let draggingEdge = null; 
let modalScale = 1;
let rawCanvas = null;

const fileInput = document.getElementById('file-input');
const dropArea = document.getElementById('drop-area');
const statusText = document.getElementById('upload-status');
const procBtn = document.getElementById('proc-btn');
const cropCanvas = document.getElementById('crop-canvas');
const ctx = cropCanvas.getContext('2d');
const lc = document.getElementById('loupe-canvas');
const lctx = lc.getContext('2d');

fileInput.onchange = (e) => {
    if(e.target.files.length) {
        const count = e.target.files.length;
        statusText.innerText = `${count} PDF${count > 1 ? 's' : ''} staged`;
        statusText.style.display = 'block';
        dropArea.classList.add('active');
        procBtn.disabled = false;
        procBtn._files = [...e.target.files];
    }
};

async function processPDF() {
    const files = procBtn._files;
    const dpi = parseFloat(document.getElementById('dpi').value);
    document.getElementById('progress-wrap').style.display = 'block';
    for (const file of files) {
        const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: dpi });
            const canv = document.createElement('canvas');
            canv.width = vp.width; canv.height = vp.height;
            await page.render({ canvasContext: canv.getContext('2d'), viewport: vp }).promise;
            const id = 'pg-' + Math.random().toString(36).substr(2,9);
            const detCorners = detectPostcard(canv);
            const thumb = renderOutput(canv, detCorners, 0);
            pages.push({ id, raw: canv, corners: detCorners, thumb, rotation: 0 });
            addCard(pages[pages.length-1]);
            updateCount();
        }
    }
    document.getElementById('progress-wrap').style.display = 'none';
}

function detectPostcard(canv) {
    const w = canv.width, h = canv.height;
    const data = canv.getContext('2d').getImageData(0,0,w,h).data;
    const isDark = (r,g,b) => (r < 240 || g < 240 || b < 240);
    let x1 = w, y1 = h, x2 = 0, y2 = 0;
    for(let y=0; y<h; y+=10) {
        for(let x=0; x<w; x+=10) {
            const i = (y*w + x) * 4;
            if(isDark(data[i], data[i+1], data[i+2])) {
                if(x < x1) x1 = x; if(x > x2) x2 = x;
                if(y < y1) y1 = y; if(y > y2) y2 = y;
            }
        }
    }
    const m = 10;
    return [{x:Math.max(0,x1-m),y:Math.max(0,y1-m)},{x:Math.min(w,x2+m),y:Math.max(0,y1-m)},{x:Math.min(w,x2+m),y:Math.min(h,y2+m)},{x:Math.max(0,x1-m),y:Math.min(h,y2+m)}];
}

function renderOutput(src, c, rot) {
    const ow = Math.max(dist(c[0],c[1]), dist(c[3],c[2]));
    const oh = Math.max(dist(c[0],c[3]), dist(c[1],c[2]));
    const out = document.createElement('canvas');
    out.width = ow; out.height = oh;
    const octx = out.getContext('2d');
    octx.drawImage(src, c[0].x, c[0].y, c[1].x-c[0].x, c[3].y-c[0].y, 0, 0, ow, oh);
    if (rot === 0) return out.toDataURL('image/jpeg', 0.9);
    const final = document.createElement('canvas');
    const rad = rot * Math.PI / 180;
    const s = Math.abs(Math.sin(rad)), cc = Math.abs(Math.cos(rad));
    final.width = ow * cc + oh * s; final.height = ow * s + oh * cc;
    const fctx = final.getContext('2d');
    fctx.translate(final.width/2, final.height/2); fctx.rotate(rad);
    fctx.drawImage(out, -ow/2, -oh/2);
    return final.toDataURL('image/jpeg', 0.9);
}

function dist(a,b) { return Math.hypot(b.x-a.x, b.y-a.y); }

function addCard(pg) {
    const div = document.createElement('div');
    div.className = 'card'; div.id = pg.id;
    div.innerHTML = `<button class="card-del" onclick="removePage('${pg.id}')">✕</button><img src="${pg.thumb}" onclick="openModal('${pg.id}')"><div class="card-foot"><span>Postcard</span><span>Edit</span></div>`;
    document.getElementById('card-grid').appendChild(div);
}

function removePage(id) { pages = pages.filter(p => p.id !== id); document.getElementById(id).remove(); updateCount(); }

function clearAll() { if(confirm('Clear all?')) { pages = []; document.getElementById('card-grid').innerHTML = ''; updateCount(); } }

function updateCount() { document.getElementById('count').innerText = pages.length; }

function openModal(id) {
    const pg = pages.find(p => p.id === id);
    modalPageId = id; rawCanvas = pg.raw; corners = pg.corners.map(c => ({...c})); rotation = pg.rotation || 0;
    document.getElementById('rotate-range').value = rotation; document.getElementById('rotate-val').innerText = rotation + '°';
    document.getElementById('modal-bg').classList.add('open'); draw();
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); document.getElementById('loupe-container').style.display='none'; }

function updateRotate(val) { rotation = parseInt(val); document.getElementById('rotate-val').innerText = val + '°'; draw(); }
function quickRotate(deg) { rotation = (rotation + deg) % 360; document.getElementById('rotate-range').value = rotation; document.getElementById('rotate-val').innerText = rotation + '°'; draw(); }

function draw() {
    const s = Math.min((window.innerWidth*0.9)/rawCanvas.width, (window.innerHeight*0.7)/rawCanvas.height, 1);
    modalScale = s;
    cropCanvas.width = rawCanvas.width; cropCanvas.height = rawCanvas.height;
    cropCanvas.style.width = (rawCanvas.width * s) + 'px'; cropCanvas.style.height = (rawCanvas.height * s) + 'px';
    ctx.drawImage(rawCanvas, 0, 0);
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.rect(0,0,cropCanvas.width, cropCanvas.height);
    ctx.moveTo(corners[0].x, corners[0].y); ctx.lineTo(corners[1].x, corners[1].y); ctx.lineTo(corners[2].x, corners[2].y); ctx.lineTo(corners[3].x, corners[3].y);
    ctx.closePath(); ctx.fill('evenodd');
    ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2/s; ctx.setLineDash([10/s, 10/s]);
    ctx.beginPath(); ctx.moveTo(corners[0].x, corners[0].y); corners.forEach(p => ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.stroke(); ctx.setLineDash([]);
    const len = 30 / s; ctx.lineWidth = 4 / s; ctx.strokeStyle = '#e8a83e'; ctx.lineCap = 'round';
    const drawKink = (p, dx, dy) => { ctx.beginPath(); ctx.moveTo(p.x + (dx * len), p.y); ctx.lineTo(p.x, p.y); ctx.lineTo(p.x, p.y + (dy * len)); ctx.stroke(); };
    drawKink(corners[0], 1, 1); drawKink(corners[1], -1, 1); drawKink(corners[2], -1, -1); drawKink(corners[3], 1, -1);
    const drawMid = (p1, p2, h) => { const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2; ctx.beginPath(); if(h){ctx.moveTo(mx-len,my);ctx.lineTo(mx+len,my);}else{ctx.moveTo(mx,my-len);ctx.lineTo(mx,my+len);} ctx.stroke(); };
    drawMid(corners[0], corners[1], true); drawMid(corners[2], corners[3], true); drawMid(corners[0], corners[3], false); drawMid(corners[1], corners[2], false);
    document.getElementById('hud-coords').innerHTML = corners.map((c,i)=>`P${i}: <span>${Math.round(c.x)},${Math.round(c.y)}</span>`).join('');
}

function getMouse(e) { const r = cropCanvas.getBoundingClientRect(); return { x: (e.clientX-r.left)/modalScale, y: (e.clientY-r.top)/modalScale }; }

cropCanvas.onmousedown = (e) => {
    const m = getMouse(e), hit = 40/modalScale;
    dragging = corners.findIndex(p => Math.hypot(p.x-m.x, p.y-m.y) < hit);
    if(dragging !== -1) return;
    const midTop = (corners[0].y + corners[1].y) / 2, midBot = (corners[2].y + corners[3].y) / 2;
    const midL = (corners[0].x + corners[3].x) / 2, midR = (corners[1].x + corners[2].x) / 2;
    if(Math.abs(m.y - midTop) < hit && m.x > corners[0].x && m.x < corners[1].x) draggingEdge = 'top';
    else if(Math.abs(m.y - midBot) < hit && m.x > corners[3].x && m.x < corners[2].x) draggingEdge = 'bottom';
    else if(Math.abs(m.x - midL) < hit && m.y > corners[0].y && m.y < corners[3].y) draggingEdge = 'left';
    else if(Math.abs(m.x - midR) < hit && m.y > corners[1].y && m.y < corners[2].y) draggingEdge = 'right';
};

window.onmousemove = (e) => {
    if(dragging === null && !draggingEdge) return;
    const m = getMouse(e);
    if(dragging !== null) { corners[dragging].x = m.x; corners[dragging].y = m.y; }
    else if(draggingEdge) {
        if(draggingEdge === 'top') { corners[0].y = m.y; corners[1].y = m.y; }
        else if(draggingEdge === 'bottom') { corners[2].y = m.y; corners[3].y = m.y; }
        else if(draggingEdge === 'left') { corners[0].x = m.x; corners[3].x = m.x; }
        else if(draggingEdge === 'right') { corners[1].x = m.x; corners[2].x = m.x; }
    }
    const focus = dragging !== null ? corners[dragging] : m;
    document.getElementById('loupe-container').style.display = 'block';
    lc.width = 200; lc.height = 200;
    const sx = Math.max(0, focus.x - 50), sy = Math.max(0, focus.y - 50);
    lctx.drawImage(rawCanvas, sx, sy, 100, 100, 0, 0, 200, 200);
    lctx.strokeStyle = '#e8a83e'; lctx.lineWidth = 2; lctx.strokeRect(95, 95, 10, 10);
    draw();
};

window.onmouseup = () => { dragging = null; draggingEdge = null; document.getElementById('loupe-container').style.display='none'; };
function autoDetectCorners() { corners = detectPostcard(rawCanvas); draw(); }
function applyCrop() {
    const pg = pages.find(p => p.id === modalPageId);
    pg.corners = corners.map(c => ({...c})); pg.rotation = rotation;
    pg.thumb = renderOutput(rawCanvas, corners, rotation);
    document.getElementById(pg.id).querySelector('img').src = pg.thumb;
    closeModal();
}
function downloadAll() {
    pages.forEach((p, i) => {
        const a = document.createElement('a'); a.href = p.thumb; a.download = `postcard-${i+1}.jpg`; a.click();
    });
}
</script>
</body>
</html>
