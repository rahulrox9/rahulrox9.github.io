<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postcard Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--surface:#1a1814;--card:#222018;--border:#2e2b26;
  --amber:#e8a83e;--amber-dim:#7a5820;--cream:#f5efe4;--muted:#6b6459;
}
html,body{height:100%;font-family:'DM Mono',monospace;background:var(--bg);color:var(--cream);overflow:hidden}
.shell{display:grid;grid-template-columns:340px 1fr;height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{display:flex;flex-direction:column}
.sidebar-head{padding:1.4rem;border-bottom:1px solid var(--border)}
.logo{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--amber)}
.drop-zone{margin:1rem;border:1.5px dashed var(--border);padding:1.5rem;text-align:center;cursor:pointer;position:relative}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.settings{padding:1.2rem;flex:1;overflow-y:auto}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;font-size:0.75rem}
.row input[type=range]{width:100px;accent-color:var(--amber)}
.grid-wrap{flex:1;overflow-y:auto;padding:1.2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.card img{width:100%;height:140px;object-fit:cover}
.card-foot{padding:0.5rem;display:flex;justify-content:space-between;font-size:0.65rem}

/* ── Modal & Crop ── */
.modal-bg{display:none;position:fixed;inset:0;background:#000;z-index:1000;flex-direction:column}
.modal-bg.open{display:flex}
.crop-container{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#111;overflow:hidden}
#crop-canvas{cursor:crosshair;max-width:95vw;max-height:80vh}

/* Fixed Inset Loupe */
#loupe-container{
    position:absolute;top:20px;left:20px;
    width:200px;height:200px;
    border:2px solid var(--amber);
    background:#000;display:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.8);
    z-index:2000;pointer-events:none;
}
#loupe-canvas{width:100%;height:100%}

.hud-bottom{padding:1rem;background:var(--surface);display:flex;gap:1rem;align-items:center;justify-content:center;flex-wrap:wrap}
.hud-coords{display:flex;gap:0.8rem;font-size:0.6rem;color:var(--muted);width:100%;justify-content:center;margin-bottom:0.5rem}
.hud-coords span{color:var(--amber)}
.btn{padding:0.5rem 1rem;background:var(--border);color:var(--cream);border:none;cursor:pointer;font-family:inherit;font-size:0.75rem}
.btn.primary{background:var(--amber);color:#000;font-weight:600}

#progress-wrap{padding:1rem;display:none}
.p-bar{height:4px;background:var(--border);width:100%}
#p-fill{height:100%;background:var(--amber);width:0%}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="sidebar-head"><div class="logo">Postcard Scanner</div></div>
    <div class="drop-zone">
      <input type="file" id="file-input" accept=".pdf" multiple>
      <strong>Drop PDF</strong><br><span style="font-size:0.7rem;opacity:0.5">Multi-page support</span>
    </div>
    <div class="settings">
        <div class="row"><label>DPI</label><input type="range" id="dpi" min="1" max="4" step="1" value="2"></div>
        <div class="row"><label>Quality</label><input type="range" id="quality" min="60" max="100" value="90"></div>
    </div>
    <div id="progress-wrap"><div class="p-bar"><div id="p-fill"></div></div><div id="p-txt" style="font-size:0.6rem;margin-top:4px"></div></div>
    <div style="padding:1rem"><button class="btn primary" id="proc-btn" style="width:100%" disabled onclick="processPDF()">Process PDF</button></div>
  </div>
  <div class="main">
    <div class="grid-wrap"><div class="grid" id="card-grid"></div></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="crop-container">
    <div id="loupe-container"><canvas id="loupe-canvas"></canvas></div>
    <canvas id="crop-canvas"></canvas>
  </div>
  <div class="hud-bottom">
    <div class="hud-coords" id="hud-coords"></div>
    <div class="row" style="margin-right:1rem">
        <label style="font-size:0.7rem;margin-right:0.5rem">Rotation</label>
        <input type="range" id="rotate-range" min="-180" max="180" step="1" value="0" oninput="updateRotate(this.value)">
        <span id="rotate-val" style="font-size:0.7rem;margin-left:0.4rem;min-width:30px">0°</span>
    </div>
    <button class="btn" onclick="quickRotate(90)">↻ 90°</button>
    <button class="btn" onclick="autoDetectCorners()">Re-detect</button>
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="applyCrop()">Apply Crop</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pages = [];
let modalPageId = null;
let corners = []; 
let rotation = 0;
let dragging = null; 
let draggingEdge = null; 
let modalScale = 1;
let rawCanvas = null;

const cropCanvas = document.getElementById('crop-canvas');
const ctx = cropCanvas.getContext('2d');
const loupeCanvas = document.getElementById('loupe-canvas');
const lctx = loupeCanvas.getContext('2d');

document.getElementById('file-input').onchange = (e) => {
    if(e.target.files.length) {
        document.getElementById('proc-btn').disabled = false;
        document.getElementById('proc-btn')._files = [...e.target.files];
    }
};

async function processPDF() {
    const files = document.getElementById('proc-btn')._files;
    const dpi = parseFloat(document.getElementById('dpi').value);
    pages = [];
    document.getElementById('card-grid').innerHTML = '';
    document.getElementById('progress-wrap').style.display = 'block';

    for (const file of files) {
        const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const vp = page.getViewport({ scale: dpi });
            const canv = document.createElement('canvas');
            canv.width = vp.width; canv.height = vp.height;
            await page.render({ canvasContext: canv.getContext('2d'), viewport: vp }).promise;
            
            const id = 'pg-' + Math.random().toString(36).substr(2,9);
            const detCorners = detectPostcard(canv);
            const dataUrl = renderOutput(canv, detCorners, 0);
            
            const pg = { id, raw: canv, corners: detCorners, thumb: dataUrl, rotation: 0 };
            pages.push(pg);
            addCard(pg);
            document.getElementById('p-txt').innerText = `Processing ${pages.length}...`;
        }
    }
    document.getElementById('progress-wrap').style.display = 'none';
}

function detectPostcard(canv) {
    const w = canv.width, h = canv.height;
    const data = canv.getContext('2d').getImageData(0,0,w,h).data;
    const isDark = (r,g,b) => (r < 240 || g < 240 || b < 240);
    let x1 = w, y1 = h, x2 = 0, y2 = 0;
    for(let y=0; y<h; y+=10) {
        for(let x=0; x<w; x+=10) {
            const i = (y*w + x) * 4;
            if(isDark(data[i], data[i+1], data[i+2])) {
                if(x < x1) x1 = x; if(x > x2) x2 = x;
                if(y < y1) y1 = y; if(y > y2) y2 = y;
            }
        }
    }
    const m = 10;
    return [{x:Math.max(0,x1-m),y:Math.max(0,y1-m)},{x:Math.min(w,x2+m),y:Math.max(0,y1-m)},{x:Math.min(w,x2+m),y:Math.min(h,y2+m)},{x:Math.max(0,x1-m),y:Math.min(h,y2+m)}];
}

function renderOutput(src, c, rot) {
    const ow = Math.max(dist(c[0],c[1]), dist(c[3],c[2]));
    const oh = Math.max(dist(c[0],c[3]), dist(c[1],c[2]));
    const out = document.createElement('canvas');
    out.width = ow; out.height = oh;
    const octx = out.getContext('2d');
    octx.drawImage(src, c[0].x, c[0].y, c[1].x-c[0].x, c[3].y-c[0].y, 0, 0, ow, oh);
    
    if (rot === 0) return out.toDataURL('image/jpeg', 0.9);
    
    const final = document.createElement('canvas');
    const rad = rot * Math.PI / 180;
    const s = Math.abs(Math.sin(rad)), cc = Math.abs(Math.cos(rad));
    final.width = ow * cc + oh
